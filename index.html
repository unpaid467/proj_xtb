<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tracker Portfeli ETF</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
    <style>
        :root {
            --bg: #0f1117;
            --surface: #1a1d27;
            --surface2: #22263a;
            --text: #e2e8f0;
            --text-muted: #8892a4;
            --accent: #3b82f6;
            --green: #10b981;
            --red: #ef4444;
            --border: #2d3244;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
        }

        header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo { display: flex; align-items: center; gap: 0.75rem; }

        .logo-icon {
            width: 42px;
            height: 42px;
            background: linear-gradient(135deg, #3b82f6, #60a5fa);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
        }

        h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.02em; }
        h1 span { color: var(--accent); }

        .last-updated { font-size: 0.8rem; color: var(--text-muted); margin-top: 2px; }

        .header-right { display: flex; flex-direction: column; align-items: flex-end; gap: 0.3rem; }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: var(--green);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.35; }
        }

        main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        .refresh-bar-container {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1rem 1.5rem;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .refresh-bar-label { font-size: 0.82rem; color: var(--text-muted); white-space: nowrap; }

        .refresh-bar-wrap {
            flex: 1;
            height: 6px;
            background: var(--surface2);
            border-radius: 3px;
            overflow: hidden;
        }

        .refresh-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), #60a5fa);
            border-radius: 3px;
            width: 100%;
            transition: width 1s linear;
        }

        .countdown-text { font-size: 0.82rem; color: var(--text-muted); white-space: nowrap; }

        .refresh-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 0.45rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.82rem;
            font-weight: 500;
            transition: opacity 0.2s;
            white-space: nowrap;
        }

        .refresh-btn:hover { opacity: 0.8; }
        .refresh-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .section-label {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-muted);
            margin-bottom: 1rem;
        }

        .etf-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(285px, 1fr));
            gap: 1.25rem;
        }

        .etf-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.5rem;
            transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
            position: relative;
        }

        .etf-card:hover {
            transform: translateY(-2px);
            border-color: #3b82f660;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
        }

        .etf-card.loading { animation: shimmer 1.5s infinite; }

        @keyframes shimmer {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.55; }
        }

        .etf-card.error { border-color: var(--red); }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .etf-symbol {
            font-size: 0.72rem;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: 0.08em;
            background: rgba(59,130,246,0.1);
            padding: 0.2rem 0.6rem;
            border-radius: 6px;
        }

        .etf-badge {
            font-size: 0.7rem;
            color: var(--text-muted);
            background: var(--surface2);
            padding: 0.2rem 0.55rem;
            border-radius: 6px;
        }

        .etf-name {
            font-size: 0.95rem;
            font-weight: 600;
            margin-bottom: 0.35rem;
            line-height: 1.3;
        }

        .etf-description {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 1.2rem;
            line-height: 1.5;
        }

        .price-row {
            display: flex;
            align-items: baseline;
            gap: 0.5rem;
            margin-bottom: 0.6rem;
            flex-wrap: wrap;
        }

        .etf-price {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            font-variant-numeric: tabular-nums;
        }

        .etf-currency { font-size: 0.82rem; color: var(--text-muted); }

        .change-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.2rem;
            padding: 0.22rem 0.65rem;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 600;
            font-variant-numeric: tabular-nums;
        }

        .change-badge.positive { background: rgba(16,185,129,0.12); color: var(--green); }
        .change-badge.negative { background: rgba(239,68,68,0.12); color: var(--red); }
        .change-badge.neutral  { background: rgba(136,146,164,0.12); color: var(--text-muted); }

        .card-divider {
            border: none;
            border-top: 1px solid var(--border);
            margin: 1rem 0 0.75rem;
        }

        .card-stats {
            display: flex;
            justify-content: space-between;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            gap: 0.18rem;
        }

        .stat-label {
            font-size: 0.62rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--text-muted);
            opacity: 0.75;
        }

        .stat-value { font-size: 0.78rem; font-variant-numeric: tabular-nums; }

        .placeholder-val { color: var(--text-muted); opacity: 0.4; }
        .error-msg { color: var(--red); font-size: 0.82rem; margin-top: 0.5rem; }

        footer {
            text-align: center;
            padding: 2rem;
            color: var(--text-muted);
            font-size: 0.78rem;
            border-top: 1px solid var(--border);
            margin-top: 3rem;
            line-height: 1.8;
        }

        footer a { color: var(--accent); text-decoration: none; }
        footer a:hover { text-decoration: underline; }

        /* ── Person portfolio cards ────────────────────────────── */
        .portfolios {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .person-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
        }

        .person-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border);
            background: var(--surface2);
        }

        .person-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.05rem;
            flex-shrink: 0;
        }

        .person-name {
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: -0.01em;
            flex: 1;
        }

        .collapse-btn {
            background: none;
            border: 1px solid var(--border);
            color: var(--text-muted);
            border-radius: 6px;
            padding: 0.2rem 0.6rem;
            font-size: 0.75rem;
            cursor: pointer;
            transition: background 0.15s, color 0.15s;
            white-space: nowrap;
        }
        .collapse-btn:hover { background: var(--surface); color: var(--text); }

        .person-body {
            padding: 1.25rem;
            overflow: hidden;
            transition: max-height 0.3s ease, padding 0.3s ease, opacity 0.3s ease;
        }
        .person-body.collapsed {
            max-height: 0 !important;
            padding-top: 0;
            padding-bottom: 0;
            opacity: 0;
        }

        .etf-info-link {
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
            font-size: 0.7rem;
            color: var(--accent);
            text-decoration: none;
            margin-top: 0.4rem;
            opacity: 0.8;
            transition: opacity 0.15s;
        }
        .etf-info-link:hover { opacity: 1; text-decoration: underline; }

        .person-body .etf-grid {
            grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
        }

        @media (max-width: 640px) {
            header { padding: 1rem; }
            main { padding: 1rem; }
            h1 { font-size: 1.2rem; }
        }

        /* ── Tabs ──────────────────────────────────────────────── */
        .tab-nav {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            display: flex;
            padding: 0 2rem;
            overflow-x: auto;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .tab-btn {
            background: none;
            border: none;
            border-bottom: 3px solid transparent;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            padding: 0.85rem 1.25rem;
            transition: color 0.2s, border-color 0.2s;
            white-space: nowrap;
            letter-spacing: -0.01em;
        }
        .tab-btn:hover { color: var(--text); }
        .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

        .tab-panel { display: none; }
        .tab-panel.active { display: block; }

        /* ── Calculator panel ───────────────────────────────────── */
        .calc-main { max-width: 1200px; margin: 0 auto; padding: 2rem; }

        .calc-controls {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            display: flex;
            align-items: flex-end;
            gap: 1rem;
            flex-wrap: wrap;
            margin-bottom: 1rem;
        }

        .calc-control-group {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
            flex: 1;
            min-width: 200px;
        }

        .calc-label {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-muted);
        }

        .calc-select,
        .calc-date-input {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 0.9rem;
            padding: 0.55rem 0.9rem;
            outline: none;
            transition: border-color 0.2s;
            width: 100%;
            color-scheme: dark;
        }
        .calc-select:focus,
        .calc-date-input:focus { border-color: var(--accent); }
        .calc-select option { background: var(--surface2); }

        .calc-run-btn {
            background: var(--accent);
            border: none;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            padding: 0.6rem 1.5rem;
            transition: opacity 0.2s;
            flex-shrink: 0;
            align-self: flex-end;
            white-space: nowrap;
        }
        .calc-run-btn:hover { opacity: 0.85; }
        .calc-run-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .calc-status {
            font-size: 0.82rem;
            color: var(--text-muted);
            min-height: 1.2em;
            margin-bottom: 0.75rem;
        }

        .calc-stats {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            margin-bottom: 1.25rem;
        }
        .calc-stat {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 0.65rem 1.1rem;
            flex: 1;
            min-width: 130px;
        }
        .calc-stat-label {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.07em;
            color: var(--text-muted);
            margin-bottom: 0.2rem;
        }
        .calc-stat-value {
            font-size: 1.05rem;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
        }
        .calc-stat-value.positive { color: var(--green); }
        .calc-stat-value.negative { color: var(--red); }

        .calc-chart-wrap {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.5rem;
            height: 460px;
            position: relative;
        }

        @media (max-width: 640px) {
            .calc-main { padding: 1rem; }
            .tab-nav { padding: 0 1rem; }
            .calc-chart-wrap { height: 320px; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo">
        <div class="logo-icon">📈</div>
        <div>
            <h1>Portfele <span>ETF</span></h1>
            <div class="last-updated" id="lastUpdated">Pobieranie danych…</div>
        </div>
    </div>
    <div class="header-right">
        <div class="status-indicator">
            <div class="status-dot"></div>
            <span id="countdownText">Następna aktualizacja za: --:--</span>
        </div>
    </div>
</header>

<nav class="tab-nav">
    <button class="tab-btn active" data-tab="portfolios" onclick="switchTab('portfolios')">📊 Portfele</button>
    <button class="tab-btn" data-tab="calculator" onclick="switchTab('calculator')">📈 Wykres ETF</button>
</nav>

<div id="panel-portfolios" class="tab-panel active">

<main>
    <div class="refresh-bar-container">
        <span class="refresh-bar-label">Następne odświeżenie</span>
        <div class="refresh-bar-wrap">
            <div class="refresh-bar" id="refreshBar"></div>
        </div>
        <span class="countdown-text" id="countdownBar">60:00</span>
        <button class="refresh-btn" id="refreshBtn" onclick="onManualRefresh()">↻ Odśwież teraz</button>
    </div>

    <div class="portfolios" id="portfolios"></div>

</main>

<footer>
    Dane dostarczone przez <a href="https://stooq.com" target="_blank" rel="noopener noreferrer">Stooq</a>
    &nbsp;·&nbsp; Aktualizacja co godzinę &nbsp;·&nbsp; Ceny mogą być opóŻnione w godzinach handlu
</footer>

</div><!-- /panel-portfolios -->

<div id="panel-calculator" class="tab-panel">
    <main class="calc-main">
        <div class="calc-controls">
            <div class="calc-control-group">
                <label class="calc-label" for="calc-etf-select">ETF</label>
                <select class="calc-select" id="calc-etf-select"></select>
            </div>
            <div class="calc-control-group">
                <label class="calc-label" for="calc-start-date">Data początkowa</label>
                <input class="calc-date-input" type="date" id="calc-start-date">
            </div>
            <button class="calc-run-btn" id="calc-run-btn" onclick="loadChartData()">Pokaż wykres</button>
        </div>
        <div id="calc-status" class="calc-status"></div>
        <div id="calc-stats-row" class="calc-stats" style="display:none;">
            <div class="calc-stat">
                <div class="calc-stat-label">Cena startowa</div>
                <div class="calc-stat-value" id="stat-start">—</div>
            </div>
            <div class="calc-stat">
                <div class="calc-stat-label">Cena aktualna</div>
                <div class="calc-stat-value" id="stat-end">—</div>
            </div>
            <div class="calc-stat">
                <div class="calc-stat-label">Zmiana</div>
                <div class="calc-stat-value" id="stat-change">—</div>
            </div>
            <div class="calc-stat">
                <div class="calc-stat-label">Maksimum</div>
                <div class="calc-stat-value" id="stat-max">—</div>
            </div>
            <div class="calc-stat">
                <div class="calc-stat-label">Minimum</div>
                <div class="calc-stat-value" id="stat-min">—</div>
            </div>
            <div class="calc-stat">
                <div class="calc-stat-label">Liczba notowań</div>
                <div class="calc-stat-value" id="stat-days">—</div>
            </div>
        </div>
        <div id="calc-chart-wrap" class="calc-chart-wrap" style="display:none;">
            <canvas id="price-chart"></canvas>
        </div>
    </main>
</div>

                    description: 'Śledzi S&P 500 z zabezpieczeniem walutowym PLN — 500 największych spółek USA · PLN · Akumulacyjny',
                    infoUrl: 'https://pl.wikipedia.org/wiki/S%26P_500',
                },
                {
                    id: 'M_INRA_NL',
                    symbol: 'INRA',
                    stooqSymbol: 'inra.nl',
                    exchange: 'AEX',
                    currency: 'USD',
                    name: 'iShares Global Clean Energy UCITS ETF (Acc)',
                    description: 'Śledzi S&P Global Clean Energy Index — spółki z sektora energii odnawialnej i czystej · USD · Akumulacyjny',
                    infoUrl: 'https://pl.wikipedia.org/wiki/Odnawialne_%C5%BAr%C3%B3d%C5%82a_energii',
                },
            ],
        },
        {
            name: 'Kacper',
            avatar: '👨',
            color: '#3b82f6',
            etfs: [
                {
                    id: 'K_VWRA_UK',
                    symbol: 'VWRA',
                    stooqSymbol: 'vwra.uk',
                    exchange: 'LSE',
                    currency: 'USD',
                    name: 'Vanguard FTSE All-World UCITS ETF (Acc)',
                    description: 'Śledzi FTSE All-World index — ponad 3000 akcji dużych i średnich spółek z ponad 50 krajów · USD · Akumulacyjny',
                    infoUrl: 'https://pl.wikipedia.org/wiki/FTSE_All-World_Index',
                },
                {
                    id: 'K_ETFBNDXPL_PL',
                    symbol: 'ETFBNDXPL',
                    stooqSymbol: 'etfbndxpl.pl',
                    exchange: 'GPW',
                    currency: 'PLN',
                    name: 'Beta ETF Nasdaq-100 PLN-Hedged UCITS (Acc)',
                    description: 'Śledzi Nasdaq-100 z zabezpieczeniem walutowym PLN — 100 największych spółek niefinansowych USA · PLN · Akumulacyjny',
                    infoUrl: 'https://pl.wikipedia.org/wiki/NASDAQ-100',
                },
                {
                    id: 'K_ETFBSPXPL_PL',
                    symbol: 'ETFBSPXPL',
                    stooqSymbol: 'etfbspxpl.pl',
                    exchange: 'GPW',
                    currency: 'PLN',
                    name: 'Beta ETF S&P 500 PLN-Hedged UCITS (Acc)',
                    description: 'Śledzi S&P 500 z zabezpieczeniem walutowym PLN — 500 największych spółek USA · PLN · Akumulacyjny',
                    infoUrl: 'https://pl.wikipedia.org/wiki/S%26P_500',
                },
            ],
        },
        // ── Aby dodać nowe portfolio, dołącz obiekt poniżej. ──
    ];

    // Derived flat list — do not edit; auto-built from PORTFOLIOS above.
    // Used by fetchAllPrices().
    const ALL_ETFS = PORTFOLIOS.flatMap(p => p.etfs);

    // ── State ──────────────────────────────────────────────────
    let refreshTimer      = null;
    let countdownInterval = null;
    let nextRefreshTime   = null;

    // ── Collapse / expand a portfolio section ─────────────────
    function togglePortfolio(bodyId, header) {
        const body = document.getElementById(bodyId);
        const btn  = header.querySelector('.collapse-btn');
        const isCollapsed = body.classList.toggle('collapsed');
        btn.textContent = isCollapsed ? '▼ Rozwiń' : '▲ Zwiń';
    }

    // ── Build skeleton cards on page load ─────────────────────
    function buildGrid() {
        const container = document.getElementById('portfolios');
        container.innerHTML = PORTFOLIOS.map(portfolio => `
            <div class="person-card">
                <div class="person-header" style="cursor:pointer;" onclick="togglePortfolio('body-${portfolio.name}', this)">
                    <span class="person-name" style="color:${portfolio.color}">${portfolio.name}</span>
                    <button class="collapse-btn" tabindex="-1">▲ Zwiń</button>
                </div>
                <div class="person-body" id="body-${portfolio.name}">
                    <div class="etf-grid">
                        ${portfolio.etfs.map(etf => `
                        <div class="etf-card loading" id="card-${etf.id}">
                            <div class="card-header">
                                <span class="etf-symbol">${etf.symbol}</span>
                                <span class="etf-badge">${etf.exchange}</span>
                            </div>
                            <div class="etf-name">${etf.name}</div>
                            <div class="etf-description">${etf.description}</div>
                            ${etf.infoUrl ? `<a class="etf-info-link" href="${etf.infoUrl}" target="_blank" rel="noopener noreferrer">🔗 Więcej informacji</a>` : ''}
                            <div class="price-row">
                                <span class="etf-price placeholder-val">—</span>
                            </div>
                            <hr class="card-divider">
                            <div class="card-stats">
                                ${['Otwarcie', 'Maks.', 'Min.', 'Wolumen'].map(l => `
                                <div class="stat-item">
                                    <span class="stat-label">${l}</span>
                                    <span class="stat-value placeholder-val">—</span>
                                </div>`).join('')}
                            </div>
                        </div>`).join('')}
                    </div>
                </div>
            </div>
        `).join('');
    }

    // ── Number formatter ──────────────────────────────────────

    function fmt(value, currency) {
        if (value === null || value === undefined || isNaN(value)) return '—';
        const locale = (currency === 'PLN') ? 'pl-PL' : 'en-US';
        return new Intl.NumberFormat(locale, {
            minimumFractionDigits: 2,
            maximumFractionDigits: 2,
        }).format(parseFloat(value));
    }

    // ── Update a single card with Stooq quote response ──────────
    function updateCard(etf, data) {
        const card = document.getElementById(`card-${etf.id}`);
        if (!card) return;
        card.classList.remove('loading');

        if (!data || !data.close) {
            card.classList.add('error');
            card.innerHTML = `
                <div class="card-header">
                    <span class="etf-symbol">${etf.symbol}</span>
                    <span class="etf-badge">${etf.exchange}</span>
                </div>
                <div class="etf-name">${etf.name}</div>
                <div class="etf-description">${etf.description}</div>
                ${etf.infoUrl ? `<a class="etf-info-link" href="${etf.infoUrl}" target="_blank" rel="noopener noreferrer">🔗 Więcej informacji</a>` : ''}
                <p class="error-msg">⚠ Dane niedostępne</p>
            `;
            return;
        }

        card.classList.remove('error');

        const price     = parseFloat(data.close);
        const open      = parseFloat(data.open);
        const currency  = etf.currency;
        const change    = price - open;
        const changePct = open ? ((price - open) / open) * 100 : NaN;
        const isPos     = change > 0;
        const isNeg     = change < 0;
        const badgeClass = isPos ? 'positive' : isNeg ? 'negative' : 'neutral';
        const arrow     = isPos ? '▲' : isNeg ? '▼' : '→';
        const sign      = isPos ? '+' : '';

        card.innerHTML = `
            <div class="card-header">
                <span class="etf-symbol">${etf.symbol}</span>
                <span class="etf-badge">${currency}</span>
            </div>
            <div class="etf-name">${etf.name}</div>
            <div class="etf-description">${etf.description}</div>
            ${etf.infoUrl ? `<a class="etf-info-link" href="${etf.infoUrl}" target="_blank" rel="noopener noreferrer">🔗 Więcej informacji</a>` : ''}
            <div class="price-row">
                <span class="etf-price">${fmt(price, currency)}</span>
                <span class="etf-currency">${currency}</span>
            </div>
            <div style="margin-bottom:0.25rem;">
                <span class="change-badge ${badgeClass}">
                    ${arrow} ${sign}${fmt(Math.abs(change), currency)}
                    &nbsp;(${sign}${isNaN(changePct) ? '—' : changePct.toFixed(2)}%) vs otwarcie
                </span>
            </div>
            <hr class="card-divider">
            <div class="card-stats">
                <div class="stat-item">
                    <span class="stat-label">Otwarcie</span>
                    <span class="stat-value">${fmt(data.open, currency)}</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Maks.</span>
                    <span class="stat-value">${fmt(data.high, currency)}</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Min.</span>
                    <span class="stat-value">${fmt(data.low, currency)}</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Wolumen</span>
                    <span class="stat-value">${data.volume ? parseInt(data.volume).toLocaleString() : '—'}</span>
                </div>
            </div>
        `;
    }

    // ── Main fetch — Stooq via corsproxy.io (parallel per-symbol) ─
    async function fetchAllPrices() {
        clearTimeout(refreshTimer);
        nextRefreshTime = Date.now() + REFRESH_INTERVAL_MS;

        document.querySelectorAll('.etf-card').forEach(c => c.classList.add('loading'));
        document.getElementById('refreshBtn').disabled = true;

        const PROXY = 'https://corsproxy.io/?';

        const results = await Promise.allSettled(
            ALL_ETFS.map(async etf => {
                const stooqUrl = `https://stooq.com/q/l/?s=${etf.stooqSymbol}&f=sd2t2ohlcv&h&e=json`;
                const res = await fetch(`${PROXY}${stooqUrl}`);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const json = await res.json();
                return json.symbols?.[0] ?? null;
            })
        );

        let anySuccess = false;
        ALL_ETFS.forEach((etf, i) => {
            if (results[i].status === 'fulfilled' && results[i].value) {
                updateCard(etf, results[i].value);
                anySuccess = true;
            } else {
                console.warn(`[ETF Tracker] Failed to fetch ${etf.symbol}:`, results[i].reason);
                updateCard(etf, null);
            }
        });

        const now = new Date();
        document.getElementById('lastUpdated').textContent = anySuccess
            ? `Ostatnia aktualizacja: ${now.toLocaleTimeString('pl-PL', { hour: '2-digit', minute: '2-digit', second: '2-digit' })} (${now.toLocaleDateString('pl-PL')})`
            : 'Aktualizacja nie powiodła się — ponowię za 1 godzinę';

        document.getElementById('refreshBtn').disabled = false;
        refreshTimer = setTimeout(fetchAllPrices, REFRESH_INTERVAL_MS);
    }

    // ── Manual refresh button ─────────────────────────────────
    function onManualRefresh() {
        clearTimeout(refreshTimer);
        clearInterval(countdownInterval);
        fetchAllPrices();
        startCountdown();
    }

    // ── Countdown timer & progress bar ────────────────────────
    function startCountdown() {
        clearInterval(countdownInterval);
        countdownInterval = setInterval(() => {
            if (!nextRefreshTime) return;
            const remaining = Math.max(0, nextRefreshTime - Date.now());
            const totalSec  = REFRESH_INTERVAL_MS / 1000;
            const remSec    = Math.ceil(remaining / 1000);
            const minutes   = Math.floor(remSec / 60);
            const seconds   = remSec % 60;
            const pct       = (remaining / REFRESH_INTERVAL_MS) * 100;
            const label     = `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;

            document.getElementById('countdownText').textContent = `Następna aktualizacja za: ${label}`;
            document.getElementById('countdownBar').textContent  = label;
            document.getElementById('refreshBar').style.width    = `${pct}%`;
        }, 1000);
    }

    // ── Initialise ────────────────────────────────────────────
    buildGrid();           // render skeleton cards from PORTFOLIOS
    fetchAllPrices();      // kick off first live-price fetch
    startCountdown();

    // ── Tab switching ──────────────────────────────────────────
    function switchTab(name) {
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('panel-' + name).classList.add('active');
        document.querySelector(`.tab-btn[data-tab="${name}"]`).classList.add('active');
    }

    // ── Calculator — populate ETF dropdown ────────────────────
    function buildCalcSelect() {
        const seen    = new Set();
        const unique  = [];
        for (const portfolio of PORTFOLIOS) {
            for (const etf of portfolio.etfs) {
                if (!seen.has(etf.stooqSymbol)) {
                    seen.add(etf.stooqSymbol);
                    unique.push(etf);
                }
            }
        }
        const sel = document.getElementById('calc-etf-select');
        sel.innerHTML = unique.map(etf =>
            `<option value="${etf.stooqSymbol}" data-currency="${etf.currency}" data-symbol="${etf.symbol}">${etf.symbol} — ${etf.name} (${etf.currency})</option>`
        ).join('');
    }

    // ── Calculator — fetch historical CSV & render chart ──────
    let priceChart = null;

    async function loadChartData() {
        const sel         = document.getElementById('calc-etf-select');
        const stooqSymbol = sel.value;
        const currency    = sel.selectedOptions[0]?.dataset.currency ?? '';
        const ticker      = sel.selectedOptions[0]?.dataset.symbol ?? stooqSymbol;
        const startDate   = document.getElementById('calc-start-date').value;

        const statusEl  = document.getElementById('calc-status');
        const statsRow  = document.getElementById('calc-stats-row');
        const chartWrap = document.getElementById('calc-chart-wrap');

        if (!startDate) {
            statusEl.textContent = 'Wybierz datę początkową.';
            return;
        }

        const d1  = startDate.replace(/-/g, '');
        const d2  = new Date().toISOString().slice(0, 10).replace(/-/g, '');

        statusEl.textContent = 'Pobieranie danych…';
        statsRow.style.display  = 'none';
        chartWrap.style.display = 'none';
        document.getElementById('calc-run-btn').disabled = true;

        try {
            const PROXY    = 'https://corsproxy.io/?';
            const stooqUrl = `https://stooq.com/q/d/l/?s=${stooqSymbol}&d1=${d1}&d2=${d2}&i=d`;
            const res      = await fetch(PROXY + stooqUrl);

            if (!res.ok) throw new Error(`HTTP ${res.status}`);

            const csv   = await res.text();
            const lines = csv.trim().split('\n').filter(Boolean);

            // Stooq returns a short HTML/error page when there's no data or session issue
            if (lines.length < 2 || !lines[0].toLowerCase().includes('date')) {
                const preview = lines[0]?.slice(0, 120) ?? '';
                throw new Error(`Brak danych CSV od Stooq. Odpowiedź: "${preview}"`);
            }

            const dates  = [];
            const prices = [];

            for (let i = 1; i < lines.length; i++) {
                const parts = lines[i].split(',');
                if (parts.length >= 5) {
                    const close = parseFloat(parts[4]);
                    if (!isNaN(close) && close > 0) {
                        dates.push(parts[0].trim());
                        prices.push(close);
                    }
                }
            }

            if (dates.length === 0) throw new Error('Brak notowań w podanym zakresie dat');

            // Stats
            const first  = prices[0];
            const last   = prices[prices.length - 1];
            const maxP   = Math.max(...prices);
            const minP   = Math.min(...prices);
            const chPct  = ((last - first) / first) * 100;
            const isPos  = last >= first;

            document.getElementById('stat-start').textContent  = `${first.toFixed(2)} ${currency}`;
            document.getElementById('stat-end').textContent    = `${last.toFixed(2)} ${currency}`;
            const chEl = document.getElementById('stat-change');
            chEl.textContent  = `${isPos ? '+' : ''}${chPct.toFixed(2)}%`;
            chEl.className    = 'calc-stat-value ' + (isPos ? 'positive' : 'negative');
            document.getElementById('stat-max').textContent    = `${maxP.toFixed(2)} ${currency}`;
            document.getElementById('stat-min').textContent    = `${minP.toFixed(2)} ${currency}`;
            document.getElementById('stat-days').textContent   = `${dates.length}`;

            statsRow.style.display  = 'flex';

            renderPriceChart(dates, prices, ticker, currency);
            chartWrap.style.display = 'block';
            statusEl.textContent    = '';

        } catch (e) {
            statusEl.textContent = `Błąd: ${e.message}`;
        } finally {
            document.getElementById('calc-run-btn').disabled = false;
        }
    }

    function renderPriceChart(dates, prices, ticker, currency) {
        if (priceChart) { priceChart.destroy(); priceChart = null; }

        const first   = prices[0];
        const last    = prices[prices.length - 1];
        const isPos   = last >= first;
        const color   = isPos ? '#10b981' : '#ef4444';

        const canvas  = document.getElementById('price-chart');
        priceChart = new Chart(canvas, {
            type: 'line',
            data: {
                labels: dates,
                datasets: [{
                    label: `${ticker} (${currency})`,
                    data: prices,
                    borderColor: color,
                    backgroundColor: color + '1a',
                    fill: true,
                    pointRadius: dates.length > 150 ? 0 : 3,
                    pointHoverRadius: 5,
                    borderWidth: 2,
                    tension: 0.1,
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: {
                        labels: { color: '#e2e8f0', font: { size: 13 } }
                    },
                    tooltip: {
                        mode: 'index',
                        intersect: false,
                        callbacks: {
                            label: ctx => `${ctx.dataset.label}: ${ctx.parsed.y.toFixed(2)} ${currency}`
                        }
                    }
                },
                scales: {
                    x: {
                        ticks: {
                            color: '#8892a4',
                            maxTicksLimit: 12,
                            maxRotation: 0,
                        },
                        grid: { color: '#2d3244' }
                    },
                    y: {
                        ticks: {
                            color: '#8892a4',
                            callback: val => `${val.toFixed(2)}`
                        },
                        grid: { color: '#2d3244' }
                    }
                },
                interaction: { mode: 'nearest', axis: 'x', intersect: false }
            }
        });
    }

    // Initialise calculator dropdown
    buildCalcSelect();

    // Default start date: 1 year ago
    (function setDefaultDate() {
        const d = new Date();
        d.setFullYear(d.getFullYear() - 1);
        document.getElementById('calc-start-date').value = d.toISOString().slice(0, 10);
    })();

</script>
