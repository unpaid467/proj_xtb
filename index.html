<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polish ETF Tracker</title>
    <style>
        :root {
            --bg: #0f1117;
            --surface: #1a1d27;
            --surface2: #22263a;
            --text: #e2e8f0;
            --text-muted: #8892a4;
            --accent: #3b82f6;
            --green: #10b981;
            --red: #ef4444;
            --border: #2d3244;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
        }

        header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo { display: flex; align-items: center; gap: 0.75rem; }

        .logo-icon {
            width: 42px;
            height: 42px;
            background: linear-gradient(135deg, #3b82f6, #60a5fa);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
        }

        h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.02em; }
        h1 span { color: var(--accent); }

        .last-updated { font-size: 0.8rem; color: var(--text-muted); margin-top: 2px; }

        .header-right { display: flex; flex-direction: column; align-items: flex-end; gap: 0.3rem; }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: var(--green);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.35; }
        }

        main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        .refresh-bar-container {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1rem 1.5rem;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .refresh-bar-label { font-size: 0.82rem; color: var(--text-muted); white-space: nowrap; }

        .refresh-bar-wrap {
            flex: 1;
            height: 6px;
            background: var(--surface2);
            border-radius: 3px;
            overflow: hidden;
        }

        .refresh-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), #60a5fa);
            border-radius: 3px;
            width: 100%;
            transition: width 1s linear;
        }

        .countdown-text { font-size: 0.82rem; color: var(--text-muted); white-space: nowrap; }

        .refresh-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 0.45rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.82rem;
            font-weight: 500;
            transition: opacity 0.2s;
            white-space: nowrap;
        }

        .refresh-btn:hover { opacity: 0.8; }
        .refresh-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .section-label {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-muted);
            margin-bottom: 1rem;
        }

        .etf-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(285px, 1fr));
            gap: 1.25rem;
        }

        .etf-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.5rem;
            transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
            position: relative;
        }

        .etf-card:hover {
            transform: translateY(-2px);
            border-color: #3b82f660;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
        }

        .etf-card.loading { animation: shimmer 1.5s infinite; }

        @keyframes shimmer {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.55; }
        }

        .etf-card.error { border-color: var(--red); }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .etf-symbol {
            font-size: 0.72rem;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: 0.08em;
            background: rgba(59,130,246,0.1);
            padding: 0.2rem 0.6rem;
            border-radius: 6px;
        }

        .etf-badge {
            font-size: 0.7rem;
            color: var(--text-muted);
            background: var(--surface2);
            padding: 0.2rem 0.55rem;
            border-radius: 6px;
        }

        .etf-name {
            font-size: 0.95rem;
            font-weight: 600;
            margin-bottom: 0.35rem;
            line-height: 1.3;
        }

        .etf-description {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 1.2rem;
            line-height: 1.5;
        }

        .price-row {
            display: flex;
            align-items: baseline;
            gap: 0.5rem;
            margin-bottom: 0.6rem;
            flex-wrap: wrap;
        }

        .etf-price {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            font-variant-numeric: tabular-nums;
        }

        .etf-currency { font-size: 0.82rem; color: var(--text-muted); }

        .change-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.2rem;
            padding: 0.22rem 0.65rem;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 600;
            font-variant-numeric: tabular-nums;
        }

        .change-badge.positive { background: rgba(16,185,129,0.12); color: var(--green); }
        .change-badge.negative { background: rgba(239,68,68,0.12); color: var(--red); }
        .change-badge.neutral  { background: rgba(136,146,164,0.12); color: var(--text-muted); }

        .card-divider {
            border: none;
            border-top: 1px solid var(--border);
            margin: 1rem 0 0.75rem;
        }

        .card-stats {
            display: flex;
            justify-content: space-between;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            gap: 0.18rem;
        }

        .stat-label {
            font-size: 0.62rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--text-muted);
            opacity: 0.75;
        }

        .stat-value { font-size: 0.78rem; font-variant-numeric: tabular-nums; }

        .placeholder-val { color: var(--text-muted); opacity: 0.4; }
        .error-msg { color: var(--red); font-size: 0.82rem; margin-top: 0.5rem; }

        footer {
            text-align: center;
            padding: 2rem;
            color: var(--text-muted);
            font-size: 0.78rem;
            border-top: 1px solid var(--border);
            margin-top: 3rem;
            line-height: 1.8;
        }

        footer a { color: var(--accent); text-decoration: none; }
        footer a:hover { text-decoration: underline; }

        @media (max-width: 640px) {
            header { padding: 1rem; }
            main { padding: 1rem; }
            h1 { font-size: 1.2rem; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo">
        <div class="logo-icon">📈</div>
        <div>
            <h1>Polish <span>ETF</span> Tracker</h1>
            <div class="last-updated" id="lastUpdated">Fetching data…</div>
        </div>
    </div>
    <div class="header-right">
        <div class="status-indicator">
            <div class="status-dot"></div>
            <span id="countdownText">Next update in: --:--</span>
        </div>
    </div>
</header>

<main>
    <div class="refresh-bar-container">
        <span class="refresh-bar-label">Next refresh</span>
        <div class="refresh-bar-wrap">
            <div class="refresh-bar" id="refreshBar"></div>
        </div>
        <span class="countdown-text" id="countdownBar">60:00</span>
        <button class="refresh-btn" id="refreshBtn" onclick="onManualRefresh()">↻ Refresh now</button>
    </div>

    <p class="section-label">Warsaw Stock Exchange (GPW) — ETFs</p>
    <div class="etf-grid" id="etfGrid"></div>
</main>

<footer>
    Data provided by <a href="https://twelvedata.com" target="_blank" rel="noopener noreferrer">Twelve Data</a>
    &nbsp;·&nbsp; Updates every hour &nbsp;·&nbsp; Prices may be delayed 15–20 min during market hours
</footer>

<script>
    // ═══════════════════════════════════════════════════════════
    //  CONFIGURATION
    // ═══════════════════════════════════════════════════════════
    const API_KEY = '0067a751532d449a8f3b2e76d450fcc8'; // <-- Place your Twelve Data API key here
    // ═══════════════════════════════════════════════════════════

    const REFRESH_INTERVAL_MS = 60 * 60 * 1000; // 1 hour

    // Polish ETFs listed on the Warsaw Stock Exchange (GPW)
    // Symbols verified against Twelve Data's ETF endpoint: https://api.twelvedata.com/etf?exchange=GPW
    const ETF_LIST = [
        {
            symbol: 'ETFBW20TR',
            exchange: 'GPW',
            name: 'Beta ETF WIG20TR UCITS',
            description: 'Tracks the WIG20 Total Return index — top 20 blue-chip companies on GPW',
        },
        {
            symbol: 'ETFBM40TR',
            exchange: 'GPW',
            name: 'Beta ETF mWIG40TR UCITS',
            description: 'Tracks the mWIG40 Total Return index — mid-cap companies on GPW',
        },
        {
            symbol: 'ETFBS80TR',
            exchange: 'GPW',
            name: 'Beta ETF sWIG80TR UCITS',
            description: 'Tracks the sWIG80 Total Return index — small-cap companies on GPW',
        },
        {
            symbol: 'ETFBSPXPL',
            exchange: 'GPW',
            name: 'Beta ETF S&P 500 PLN Hedged',
            description: 'Tracks the S&P 500 index with PLN currency hedge',
        },
        {
            symbol: 'ETFBNDXPL',
            exchange: 'GPW',
            name: 'Beta ETF Nasdaq-100 PLN Hedged',
            description: 'Tracks the Nasdaq-100 index with PLN currency hedge',
        },
        {
            symbol: 'ETFBDIVPL',
            exchange: 'GPW',
            name: 'Beta ETF Dywidenda Plus',
            description: 'Tracks Polish dividend-paying companies listed on GPW',
        },
    ];

    // ── State ──────────────────────────────────────────────────
    let refreshTimer      = null;
    let countdownInterval = null;
    let nextRefreshTime   = null;

    // ── Build skeleton cards on page load ─────────────────────
    function buildGrid() {
        const grid = document.getElementById('etfGrid');
        grid.innerHTML = ETF_LIST.map(etf => `
            <div class="etf-card loading" id="card-${etf.symbol}">
                <div class="card-header">
                    <span class="etf-symbol">${etf.symbol}</span>
                    <span class="etf-badge">WSE</span>
                </div>
                <div class="etf-name">${etf.name}</div>
                <div class="etf-description">${etf.description}</div>
                <div class="price-row">
                    <span class="etf-price placeholder-val">—</span>
                </div>
                <hr class="card-divider">
                <div class="card-stats">
                    ${['Open','High','Low','Prev Close'].map(l => `
                    <div class="stat-item">
                        <span class="stat-label">${l}</span>
                        <span class="stat-value placeholder-val">—</span>
                    </div>`).join('')}
                </div>
            </div>
        `).join('');
    }

    // ── Number formatter ──────────────────────────────────────
    function fmt(value, currency) {
        if (value === null || value === undefined || isNaN(value)) return '—';
        const locale = (currency === 'PLN') ? 'pl-PL' : 'en-US';
        return new Intl.NumberFormat(locale, {
            minimumFractionDigits: 2,
            maximumFractionDigits: 2,
        }).format(parseFloat(value));
    }

    // ── Update a single card with API data ────────────────────
    function updateCard(etf, data) {
        const card = document.getElementById(`card-${etf.symbol}`);
        if (!card) return;
        card.classList.remove('loading');

        // Handle API-level errors
        if (!data || data.status === 'error') {
            card.classList.add('error');
            card.innerHTML = `
                <div class="card-header">
                    <span class="etf-symbol">${etf.symbol}</span>
                    <span class="etf-badge">WSE</span>
                </div>
                <div class="etf-name">${etf.name}</div>
                <div class="etf-description">${etf.description}</div>
                <p class="error-msg">⚠ ${data?.message || 'Data unavailable — symbol may not be in your plan'}</p>
            `;
            return;
        }

        card.classList.remove('error');

        const price      = parseFloat(data.close);
        const change     = parseFloat(data.change);
        const changePct  = parseFloat(data.percent_change);
        const currency   = data.currency || 'PLN';
        const isPos      = change > 0;
        const isNeg      = change < 0;
        const badgeClass = isPos ? 'positive' : isNeg ? 'negative' : 'neutral';
        const arrow      = isPos ? '▲' : isNeg ? '▼' : '→';
        const sign       = isPos ? '+' : '';

        card.innerHTML = `
            <div class="card-header">
                <span class="etf-symbol">${etf.symbol}</span>
                <span class="etf-badge">${currency}</span>
            </div>
            <div class="etf-name">${data.name || etf.name}</div>
            <div class="etf-description">${etf.description}</div>
            <div class="price-row">
                <span class="etf-price">${fmt(price, currency)}</span>
                <span class="etf-currency">${currency}</span>
            </div>
            <div style="margin-bottom:0.25rem;">
                <span class="change-badge ${badgeClass}">
                    ${arrow} ${sign}${fmt(Math.abs(change), currency)}
                    &nbsp;(${sign}${isNaN(changePct) ? '—' : changePct.toFixed(2)}%)
                </span>
            </div>
            <hr class="card-divider">
            <div class="card-stats">
                <div class="stat-item">
                    <span class="stat-label">Open</span>
                    <span class="stat-value">${fmt(data.open, currency)}</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">High</span>
                    <span class="stat-value">${fmt(data.high, currency)}</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Low</span>
                    <span class="stat-value">${fmt(data.low, currency)}</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Prev Close</span>
                    <span class="stat-value">${fmt(data.previous_close, currency)}</span>
                </div>
            </div>
        `;
    }

    // ── Main fetch ────────────────────────────────────────────
    async function fetchAllPrices() {
        // Reset countdown
        clearTimeout(refreshTimer);
        nextRefreshTime = Date.now() + REFRESH_INTERVAL_MS;

        // Reset cards to loading state
        document.querySelectorAll('.etf-card').forEach(c => c.classList.add('loading'));
        document.getElementById('refreshBtn').disabled = true;

        // Build comma-separated symbol list with exchange suffix
        const symbols = ETF_LIST.map(e => `${e.symbol}:${e.exchange}`).join(',');
        const url = `https://api.twelvedata.com/quote?symbol=${encodeURIComponent(symbols)}&apikey=${API_KEY}`;

        try {
            const response = await fetch(url);
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const data = await response.json();

            ETF_LIST.forEach(etf => {
                // Twelve Data keys the response by "SYMBOL:EXCHANGE" for batch requests
                const key = `${etf.symbol}:${etf.exchange}`;
                const entry = (ETF_LIST.length === 1)
                    ? data
                    : (data[key] ?? data[etf.symbol] ?? null);
                updateCard(etf, entry);
            });

            const now = new Date();
            document.getElementById('lastUpdated').textContent =
                `Last updated: ${now.toLocaleTimeString('pl-PL', { hour: '2-digit', minute: '2-digit', second: '2-digit' })} (${now.toLocaleDateString('pl-PL')})`;

        } catch (err) {
            console.error('[ETF Tracker] Fetch failed:', err);
            ETF_LIST.forEach(etf => updateCard(etf, { status: 'error', message: err.message }));
            document.getElementById('lastUpdated').textContent = 'Last update failed — will retry in 1 hour';
        }

        document.getElementById('refreshBtn').disabled = false;

        // Schedule next auto-refresh
        refreshTimer = setTimeout(fetchAllPrices, REFRESH_INTERVAL_MS);
    }

    // ── Manual refresh button ─────────────────────────────────
    function onManualRefresh() {
        clearTimeout(refreshTimer);
        clearInterval(countdownInterval);
        fetchAllPrices();
        startCountdown();
    }

    // ── Countdown timer & progress bar ────────────────────────
    function startCountdown() {
        clearInterval(countdownInterval);
        countdownInterval = setInterval(() => {
            if (!nextRefreshTime) return;
            const remaining = Math.max(0, nextRefreshTime - Date.now());
            const totalSec  = REFRESH_INTERVAL_MS / 1000;
            const remSec    = Math.ceil(remaining / 1000);
            const minutes   = Math.floor(remSec / 60);
            const seconds   = remSec % 60;
            const pct       = (remaining / REFRESH_INTERVAL_MS) * 100;
            const label     = `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;

            document.getElementById('countdownText').textContent = `Next update in: ${label}`;
            document.getElementById('countdownBar').textContent  = label;
            document.getElementById('refreshBar').style.width    = `${pct}%`;
        }, 1000);
    }

    // ── Initialise ────────────────────────────────────────────
    buildGrid();
    fetchAllPrices();
    startCountdown();
</script>

</body>
</html>
