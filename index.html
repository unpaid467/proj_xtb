<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polish ETF Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
    <style>
        :root {
            --bg: #0f1117;
            --surface: #1a1d27;
            --surface2: #22263a;
            --text: #e2e8f0;
            --text-muted: #8892a4;
            --accent: #3b82f6;
            --green: #10b981;
            --red: #ef4444;
            --border: #2d3244;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
        }

        header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo { display: flex; align-items: center; gap: 0.75rem; }

        .logo-icon {
            width: 42px;
            height: 42px;
            background: linear-gradient(135deg, #3b82f6, #60a5fa);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
        }

        h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.02em; }
        h1 span { color: var(--accent); }

        .last-updated { font-size: 0.8rem; color: var(--text-muted); margin-top: 2px; }

        .header-right { display: flex; flex-direction: column; align-items: flex-end; gap: 0.3rem; }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: var(--green);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.35; }
        }

        main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        .refresh-bar-container {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1rem 1.5rem;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .refresh-bar-label { font-size: 0.82rem; color: var(--text-muted); white-space: nowrap; }

        .refresh-bar-wrap {
            flex: 1;
            height: 6px;
            background: var(--surface2);
            border-radius: 3px;
            overflow: hidden;
        }

        .refresh-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), #60a5fa);
            border-radius: 3px;
            width: 100%;
            transition: width 1s linear;
        }

        .countdown-text { font-size: 0.82rem; color: var(--text-muted); white-space: nowrap; }

        .refresh-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 0.45rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.82rem;
            font-weight: 500;
            transition: opacity 0.2s;
            white-space: nowrap;
        }

        .refresh-btn:hover { opacity: 0.8; }
        .refresh-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .section-label {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-muted);
            margin-bottom: 1rem;
        }

        .etf-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(285px, 1fr));
            gap: 1.25rem;
        }

        .etf-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.5rem;
            transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
            position: relative;
        }

        .etf-card:hover {
            transform: translateY(-2px);
            border-color: #3b82f660;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
        }

        .etf-card.loading { animation: shimmer 1.5s infinite; }

        @keyframes shimmer {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.55; }
        }

        .etf-card.error { border-color: var(--red); }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .etf-symbol {
            font-size: 0.72rem;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: 0.08em;
            background: rgba(59,130,246,0.1);
            padding: 0.2rem 0.6rem;
            border-radius: 6px;
        }

        .etf-badge {
            font-size: 0.7rem;
            color: var(--text-muted);
            background: var(--surface2);
            padding: 0.2rem 0.55rem;
            border-radius: 6px;
        }

        .etf-name {
            font-size: 0.95rem;
            font-weight: 600;
            margin-bottom: 0.35rem;
            line-height: 1.3;
        }

        .etf-description {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 1.2rem;
            line-height: 1.5;
        }

        .price-row {
            display: flex;
            align-items: baseline;
            gap: 0.5rem;
            margin-bottom: 0.6rem;
            flex-wrap: wrap;
        }

        .etf-price {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            font-variant-numeric: tabular-nums;
        }

        .etf-currency { font-size: 0.82rem; color: var(--text-muted); }

        .change-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.2rem;
            padding: 0.22rem 0.65rem;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 600;
            font-variant-numeric: tabular-nums;
        }

        .change-badge.positive { background: rgba(16,185,129,0.12); color: var(--green); }
        .change-badge.negative { background: rgba(239,68,68,0.12); color: var(--red); }
        .change-badge.neutral  { background: rgba(136,146,164,0.12); color: var(--text-muted); }

        .card-divider {
            border: none;
            border-top: 1px solid var(--border);
            margin: 1rem 0 0.75rem;
        }

        .card-stats {
            display: flex;
            justify-content: space-between;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            gap: 0.18rem;
        }

        .stat-label {
            font-size: 0.62rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--text-muted);
            opacity: 0.75;
        }

        .stat-value { font-size: 0.78rem; font-variant-numeric: tabular-nums; }

        .placeholder-val { color: var(--text-muted); opacity: 0.4; }
        .error-msg { color: var(--red); font-size: 0.82rem; margin-top: 0.5rem; }

        footer {
            text-align: center;
            padding: 2rem;
            color: var(--text-muted);
            font-size: 0.78rem;
            border-top: 1px solid var(--border);
            margin-top: 3rem;
            line-height: 1.8;
        }

        footer a { color: var(--accent); text-decoration: none; }
        footer a:hover { text-decoration: underline; }

        /* ── Investment Calculator ─────────────────────────────── */
        .calc-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.75rem;
            margin-top: 0;
        }

        .calc-form {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            align-items: flex-end;
            margin-bottom: 1.5rem;
        }

        .calc-field {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
            flex: 1;
            min-width: 150px;
        }

        .calc-label {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-muted);
        }

        .calc-field select,
        .calc-field input[type="date"],
        .calc-field input[type="number"] {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            padding: 0.55rem 0.85rem;
            font-size: 0.88rem;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
            color-scheme: dark;
        }

        .calc-field select:focus,
        .calc-field input:focus { border-color: var(--accent); }

        .calc-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 0.55rem 1.5rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.88rem;
            font-weight: 600;
            font-family: inherit;
            transition: opacity 0.2s;
            white-space: nowrap;
            align-self: flex-end;
        }

        .calc-btn:hover { opacity: 0.85; }
        .calc-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .calc-summary {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .calc-stat {
            background: var(--surface2);
            border-radius: 12px;
            padding: 1rem 1.25rem;
            flex: 1;
            min-width: 110px;
        }

        .calc-stat-label {
            font-size: 0.62rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-muted);
            margin-bottom: 0.35rem;
        }

        .calc-stat-value {
            font-size: 1.15rem;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
            line-height: 1.3;
        }

        .calc-chart-wrap {
            position: relative;
            height: 300px;
        }

        .calc-note {
            font-size: 0.72rem;
            color: var(--text-muted);
            margin-top: 0.75rem;
            opacity: 0.75;
        }

        .calc-loading {
            text-align: center;
            padding: 2.5rem;
            color: var(--text-muted);
            font-size: 0.88rem;
        }

        @media (max-width: 640px) {
            .calc-form { flex-direction: column; }
            .calc-field { min-width: unset; }
            .calc-chart-wrap { height: 220px; }
        }

        @media (max-width: 640px) {
            header { padding: 1rem; }
            main { padding: 1rem; }
            h1 { font-size: 1.2rem; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo">
        <div class="logo-icon">📈</div>
        <div>
            <h1>Polish <span>ETF</span> Tracker</h1>
            <div class="last-updated" id="lastUpdated">Fetching data…</div>
        </div>
    </div>
    <div class="header-right">
        <div class="status-indicator">
            <div class="status-dot"></div>
            <span id="countdownText">Next update in: --:--</span>
        </div>
    </div>
</header>

<main>
    <div class="refresh-bar-container">
        <span class="refresh-bar-label">Next refresh</span>
        <div class="refresh-bar-wrap">
            <div class="refresh-bar" id="refreshBar"></div>
        </div>
        <span class="countdown-text" id="countdownBar">60:00</span>
        <button class="refresh-btn" id="refreshBtn" onclick="onManualRefresh()">↻ Refresh now</button>
    </div>

    <p class="section-label">Warsaw Stock Exchange (GPW) — ETFs</p>
    <div class="etf-grid" id="etfGrid"></div>

    <!-- ── Investment Calculator ─────────────────────────── -->
    <p class="section-label" style="margin-top:2.5rem;">Past Investment Calculator</p>
    <div class="calc-card">
        <div class="calc-form">
            <div class="calc-field">
                <label class="calc-label" for="calcEtf">ETF</label>
                <select id="calcEtf">
                    <option value="0">VWRA — Vanguard FTSE All-World (USD)</option>
                    <option value="1">ETFBNDXPL — Nasdaq-100 PLN-Hedged</option>
                    <option value="2">ETFBSPXPL — S&amp;P 500 PLN-Hedged</option>
                </select>
            </div>
            <div class="calc-field">
                <label class="calc-label" for="calcDate">Start Date</label>
                <input type="date" id="calcDate" />
            </div>
            <div class="calc-field">
                <label class="calc-label" for="calcAmount">Amount (PLN)</label>
                <input type="number" id="calcAmount" placeholder="e.g. 10 000" min="1" step="1" />
            </div>
            <button class="calc-btn" id="calcBtn" onclick="runCalculator()">Calculate ↗</button>
        </div>

        <div id="calcLoading" class="calc-loading" style="display:none;">⏳ Fetching historical data…</div>
        <div id="calcError" class="error-msg" style="display:none;"></div>

        <div id="calcResult" style="display:none;">
            <div class="calc-summary" id="calcSummary"></div>
            <div class="calc-chart-wrap">
                <canvas id="calcChart"></canvas>
            </div>
            <p class="calc-note" id="calcNote"></p>
        </div>
    </div>
</main>

<footer>
    Data provided by <a href="https://stooq.com" target="_blank" rel="noopener noreferrer">Stooq</a>
    &nbsp;·&nbsp; Updates every hour &nbsp;·&nbsp; Prices may be delayed during market hours
</footer>

<script>
    // ═══════════════════════════════════════════════════════════
    //  CONFIGURATION — Stooq (100% free, no API key required)
    // ═══════════════════════════════════════════════════════════

    const REFRESH_INTERVAL_MS = 60 * 60 * 1000; // 1 hour

    // symbol      — display ticker shown on the card
    // stooqSymbol — Stooq symbol (lowercase, with exchange suffix)
    // exchange    — exchange label shown on the card
    // currency    — ISO currency code used for number formatting
    // id          — unique key for the DOM card element (no special chars)
    const ETF_LIST = [
        {
            id: 'VWRA_UK',
            symbol: 'VWRA',
            stooqSymbol: 'vwra.uk',
            exchange: 'LSE',
            currency: 'USD',
            name: 'Vanguard FTSE All-World UCITS ETF (Acc)',
            description: 'Tracks the FTSE All-World index — 3,000+ large & mid-cap stocks across 50+ countries · USD · Accumulating',
        },
        {
            id: 'ETFBNDXPL_PL',
            symbol: 'ETFBNDXPL',
            stooqSymbol: 'etfbndxpl.pl',
            exchange: 'GPW',
            currency: 'PLN',
            name: 'Beta ETF Nasdaq-100 PLN-Hedged UCITS (Acc)',
            description: 'Tracks the Nasdaq-100 index with PLN currency hedge — top 100 non-financial US companies · PLN · Accumulating',
        },
        {
            id: 'ETFBSPXPL_PL',
            symbol: 'ETFBSPXPL',
            stooqSymbol: 'etfbspxpl.pl',
            exchange: 'GPW',
            currency: 'PLN',
            name: 'Beta ETF S&P 500 PLN-Hedged UCITS (Acc)',
            description: 'Tracks the S&P 500 index with PLN currency hedge — 500 largest US companies · PLN · Accumulating',
        },
    ];

    // ── State ──────────────────────────────────────────────────
    let refreshTimer      = null;
    let countdownInterval = null;
    let nextRefreshTime   = null;

    // ── Build skeleton cards on page load ─────────────────────
    function buildGrid() {
        const grid = document.getElementById('etfGrid');
        grid.innerHTML = ETF_LIST.map(etf => `
            <div class="etf-card loading" id="card-${etf.id}">
                <div class="card-header">
                    <span class="etf-symbol">${etf.symbol}</span>
                    <span class="etf-badge">${etf.exchange}</span>
                </div>
                <div class="etf-name">${etf.name}</div>
                <div class="etf-description">${etf.description}</div>
                <div class="price-row">
                    <span class="etf-price placeholder-val">—</span>
                </div>
                <hr class="card-divider">
                <div class="card-stats">
                    ${['Open','High','Low','Prev Close'].map(l => `
                    <div class="stat-item">
                        <span class="stat-label">${l}</span>
                        <span class="stat-value placeholder-val">—</span>
                    </div>`).join('')}
                </div>
            </div>
        `).join('');
    }

    // ── Number formatter ──────────────────────────────────────
    function fmt(value, currency) {
        if (value === null || value === undefined || isNaN(value)) return '—';
        const locale = (currency === 'PLN') ? 'pl-PL' : 'en-US';
        return new Intl.NumberFormat(locale, {
            minimumFractionDigits: 2,
            maximumFractionDigits: 2,
        }).format(parseFloat(value));
    }

    // ── Update a single card with Stooq quote response ──────────
    function updateCard(etf, data) {
        const card = document.getElementById(`card-${etf.id}`);
        if (!card) return;
        card.classList.remove('loading');

        if (!data || !data.close) {
            card.classList.add('error');
            card.innerHTML = `
                <div class="card-header">
                    <span class="etf-symbol">${etf.symbol}</span>
                    <span class="etf-badge">${etf.exchange}</span>
                </div>
                <div class="etf-name">${etf.name}</div>
                <div class="etf-description">${etf.description}</div>
                <p class="error-msg">⚠ Data unavailable</p>
            `;
            return;
        }

        card.classList.remove('error');

        const price     = parseFloat(data.close);
        const open      = parseFloat(data.open);
        const currency  = etf.currency;
        const change    = price - open;
        const changePct = open ? ((price - open) / open) * 100 : NaN;
        const isPos     = change > 0;
        const isNeg     = change < 0;
        const badgeClass = isPos ? 'positive' : isNeg ? 'negative' : 'neutral';
        const arrow     = isPos ? '▲' : isNeg ? '▼' : '→';
        const sign      = isPos ? '+' : '';

        card.innerHTML = `
            <div class="card-header">
                <span class="etf-symbol">${etf.symbol}</span>
                <span class="etf-badge">${currency}</span>
            </div>
            <div class="etf-name">${etf.name}</div>
            <div class="etf-description">${etf.description}</div>
            <div class="price-row">
                <span class="etf-price">${fmt(price, currency)}</span>
                <span class="etf-currency">${currency}</span>
            </div>
            <div style="margin-bottom:0.25rem;">
                <span class="change-badge ${badgeClass}">
                    ${arrow} ${sign}${fmt(Math.abs(change), currency)}
                    &nbsp;(${sign}${isNaN(changePct) ? '—' : changePct.toFixed(2)}%) vs open
                </span>
            </div>
            <hr class="card-divider">
            <div class="card-stats">
                <div class="stat-item">
                    <span class="stat-label">Open</span>
                    <span class="stat-value">${fmt(data.open, currency)}</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">High</span>
                    <span class="stat-value">${fmt(data.high, currency)}</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Low</span>
                    <span class="stat-value">${fmt(data.low, currency)}</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Volume</span>
                    <span class="stat-value">${data.volume ? parseInt(data.volume).toLocaleString() : '—'}</span>
                </div>
            </div>
        `;
    }

    // ── Main fetch — Stooq via corsproxy.io (parallel per-symbol) ─
    async function fetchAllPrices() {
        clearTimeout(refreshTimer);
        nextRefreshTime = Date.now() + REFRESH_INTERVAL_MS;

        document.querySelectorAll('.etf-card').forEach(c => c.classList.add('loading'));
        document.getElementById('refreshBtn').disabled = true;

        // Stooq serves one symbol per request; fire them all in parallel via CORS proxy
        const PROXY = 'https://corsproxy.io/?';

        const results = await Promise.allSettled(
            ETF_LIST.map(async etf => {
                const stooqUrl = `https://stooq.com/q/l/?s=${etf.stooqSymbol}&f=sd2t2ohlcv&h&e=json`;
                const res = await fetch(`${PROXY}${stooqUrl}`);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const json = await res.json();
                return json.symbols?.[0] ?? null;
            })
        );

        let anySuccess = false;
        ETF_LIST.forEach((etf, i) => {
            if (results[i].status === 'fulfilled' && results[i].value) {
                updateCard(etf, results[i].value);
                anySuccess = true;
            } else {
                console.warn(`[ETF Tracker] Failed to fetch ${etf.symbol}:`, results[i].reason);
                updateCard(etf, null);
            }
        });

        const now = new Date();
        document.getElementById('lastUpdated').textContent = anySuccess
            ? `Last updated: ${now.toLocaleTimeString('pl-PL', { hour: '2-digit', minute: '2-digit', second: '2-digit' })} (${now.toLocaleDateString('pl-PL')})`
            : 'Last update failed — will retry in 1 hour';

        document.getElementById('refreshBtn').disabled = false;
        refreshTimer = setTimeout(fetchAllPrices, REFRESH_INTERVAL_MS);
    }

    // ── Manual refresh button ─────────────────────────────────
    function onManualRefresh() {
        clearTimeout(refreshTimer);
        clearInterval(countdownInterval);
        fetchAllPrices();
        startCountdown();
    }

    // ── Countdown timer & progress bar ────────────────────────
    function startCountdown() {
        clearInterval(countdownInterval);
        countdownInterval = setInterval(() => {
            if (!nextRefreshTime) return;
            const remaining = Math.max(0, nextRefreshTime - Date.now());
            const totalSec  = REFRESH_INTERVAL_MS / 1000;
            const remSec    = Math.ceil(remaining / 1000);
            const minutes   = Math.floor(remSec / 60);
            const seconds   = remSec % 60;
            const pct       = (remaining / REFRESH_INTERVAL_MS) * 100;
            const label     = `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;

            document.getElementById('countdownText').textContent = `Next update in: ${label}`;
            document.getElementById('countdownBar').textContent  = label;
            document.getElementById('refreshBar').style.width    = `${pct}%`;
        }, 1000);
    }

    // ── Initialise ────────────────────────────────────────────
    buildGrid();
    fetchAllPrices();
    startCountdown();

    // ── Investment Calculator ─────────────────────────────────
    (function initCalcDefaults() {
        // Default start date = 1 year ago
        const d = new Date();
        d.setFullYear(d.getFullYear() - 1);
        const iso = d.toISOString().slice(0, 10);
        const input = document.getElementById('calcDate');
        input.value = iso;
        input.max   = new Date().toISOString().slice(0, 10);
        // Default amount
        document.getElementById('calcAmount').value = '10000';
    })();

    let _calcChart = null;

    function stooqDateStr(d) {
        return d.toISOString().slice(0, 10).replace(/-/g, '');
    }

    function fmtPLN(n) {
        return new Intl.NumberFormat('pl-PL', {
            minimumFractionDigits: 2,
            maximumFractionDigits: 2,
        }).format(n) + '\u00a0PLN';
    }

    function parseStooqCSV(csv) {
        const lines = csv.trim().split('\n');
        if (lines.length < 2) return [];
        return lines.slice(1).map(line => {
            const parts = line.split(',');
            return { date: (parts[0] || '').trim(), close: parseFloat(parts[4]) };
        }).filter(r => r.date && !isNaN(r.close));
    }

    function showCalcError(msg) {
        document.getElementById('calcLoading').style.display = 'none';
        document.getElementById('calcResult').style.display  = 'none';
        const el = document.getElementById('calcError');
        el.textContent = '\u26a0 ' + msg;
        el.style.display = 'block';
    }

    function renderCalcChart(labels, values, initialAmount, etfLabel) {
        const ctx = document.getElementById('calcChart').getContext('2d');
        if (_calcChart) { _calcChart.destroy(); _calcChart = null; }

        const last      = values[values.length - 1];
        const isUp      = last >= initialAmount;
        const lineColor = isUp ? '#10b981' : '#ef4444';
        const fillColor = isUp ? 'rgba(16,185,129,0.07)' : 'rgba(239,68,68,0.07)';

        _calcChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels,
                datasets: [
                    {
                        label: etfLabel + ' (PLN)',
                        data: values,
                        borderColor: lineColor,
                        backgroundColor: fillColor,
                        fill: true,
                        tension: 0.35,
                        pointRadius: 0,
                        pointHoverRadius: 4,
                        borderWidth: 2,
                    },
                    {
                        label: 'Initial investment',
                        data: new Array(values.length).fill(initialAmount),
                        borderColor: 'rgba(136,146,164,0.35)',
                        borderDash: [6, 4],
                        borderWidth: 1.5,
                        pointRadius: 0,
                        fill: false,
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                interaction: { intersect: false, mode: 'index' },
                plugins: {
                    legend: {
                        labels: { color: '#8892a4', font: { size: 11 }, boxWidth: 18 }
                    },
                    tooltip: {
                        backgroundColor: '#1a1d27',
                        borderColor: '#2d3244',
                        borderWidth: 1,
                        titleColor: '#e2e8f0',
                        bodyColor: '#8892a4',
                        padding: 10,
                        callbacks: {
                            label: c => ` ${c.dataset.label}: ${
                                new Intl.NumberFormat('pl-PL', {
                                    minimumFractionDigits: 2,
                                    maximumFractionDigits: 2,
                                }).format(c.parsed.y)
                            }\u00a0PLN`
                        }
                    }
                },
                scales: {
                    x: {
                        ticks: { color: '#8892a4', font: { size: 10 }, maxTicksLimit: 8, maxRotation: 0 },
                        grid:  { color: '#2d3244' }
                    },
                    y: {
                        ticks: {
                            color: '#8892a4',
                            font: { size: 10 },
                            callback: v => new Intl.NumberFormat('pl-PL', {
                                minimumFractionDigits: 0,
                                maximumFractionDigits: 0,
                            }).format(v) + '\u00a0PLN'
                        },
                        grid: { color: '#2d3244' }
                    }
                }
            }
        });
    }

    async function runCalculator() {
        const idx    = parseInt(document.getElementById('calcEtf').value, 10);
        const etf    = ETF_LIST[idx];
        const dateStr = document.getElementById('calcDate').value;
        const amount = parseFloat(document.getElementById('calcAmount').value);

        if (!dateStr)               { showCalcError('Please select a start date.'); return; }
        if (!amount || amount <= 0) { showCalcError('Please enter a valid PLN amount.'); return; }
        const startDate = new Date(dateStr);
        if (startDate >= new Date()) { showCalcError('Start date must be in the past.'); return; }

        const d1 = dateStr.replace(/-/g, '');
        const d2 = stooqDateStr(new Date());

        document.getElementById('calcResult').style.display  = 'none';
        document.getElementById('calcError').style.display   = 'none';
        document.getElementById('calcLoading').style.display = 'block';
        document.getElementById('calcBtn').disabled = true;

        try {
            const PROXY    = 'https://corsproxy.io/?';
            const stooqUrl = `https://stooq.com/q/d/l/?s=${etf.stooqSymbol}&d1=${d1}&d2=${d2}&i=d`;
            const res = await fetch(PROXY + stooqUrl);
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const csv  = await res.text();
            const rows = parseStooqCSV(csv);

            if (rows.length === 0) throw new Error('No trading data found for this date range. Try a more recent start date.');

            const startPrice   = rows[0].close;
            const labels       = rows.map(r => r.date);
            const values       = rows.map(r => parseFloat((amount * r.close / startPrice).toFixed(2)));
            const currentValue = values[values.length - 1];
            const gain         = currentValue - amount;
            const gainPct      = (gain / amount) * 100;
            const gainSign     = gain >= 0 ? '+' : '';
            const gainColor    = gain >= 0 ? 'var(--green)' : 'var(--red)';

            document.getElementById('calcSummary').innerHTML = `
                <div class="calc-stat">
                    <div class="calc-stat-label">Invested</div>
                    <div class="calc-stat-value">${fmtPLN(amount)}</div>
                </div>
                <div class="calc-stat">
                    <div class="calc-stat-label">Value Today</div>
                    <div class="calc-stat-value" style="color:${gainColor}">${fmtPLN(currentValue)}</div>
                </div>
                <div class="calc-stat">
                    <div class="calc-stat-label">Gain / Loss</div>
                    <div class="calc-stat-value" style="color:${gainColor}">
                        ${gainSign}${fmtPLN(gain)}
                        <span style="font-size:0.78rem; font-weight:600; display:block;">(${gainSign}${gainPct.toFixed(2)}%)</span>
                    </div>
                </div>
                <div class="calc-stat">
                    <div class="calc-stat-label">Trading Days</div>
                    <div class="calc-stat-value" style="font-size:1rem;">${rows.length}</div>
                </div>
            `;

            const noteText = etf.currency !== 'PLN'
                ? `\u26a0\ufe0f ${etf.symbol} is priced in ${etf.currency}. This calculator tracks the ETF\u2019s price return only and does not adjust for PLN/${etf.currency} exchange rate fluctuations.`
                : `Data source: Stooq. Past performance does not guarantee future results.`;
            document.getElementById('calcNote').textContent = noteText;

            renderCalcChart(labels, values, amount, etf.symbol);

            document.getElementById('calcLoading').style.display = 'none';
            document.getElementById('calcResult').style.display  = 'block';

        } catch (err) {
            showCalcError(err.message);
        } finally {
            document.getElementById('calcBtn').disabled = false;
            document.getElementById('calcLoading').style.display = 'none';
        }
    }
</script>
