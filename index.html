<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tracker Portfeli ETF</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/pl.js"></script>
    <style>
        :root {
            --bg: #0f1117;
            --surface: #1a1d27;
            --surface2: #22263a;
            --text: #e2e8f0;
            --text-muted: #8892a4;
            --accent: #3b82f6;
            --green: #10b981;
            --red: #ef4444;
            --border: #2d3244;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
        }

        header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo { display: flex; align-items: center; gap: 0.75rem; }

        .logo-icon {
            width: 42px;
            height: 42px;
            background: linear-gradient(135deg, #3b82f6, #60a5fa);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
        }

        h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.02em; }
        h1 span { color: var(--accent); }

        .last-updated { font-size: 0.8rem; color: var(--text-muted); margin-top: 2px; }

        .header-right { display: flex; flex-direction: column; align-items: flex-end; gap: 0.3rem; }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: var(--green);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.35; }
        }

        main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        .refresh-bar-container {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1rem 1.5rem;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .refresh-bar-label { font-size: 0.82rem; color: var(--text-muted); white-space: nowrap; }

        .refresh-bar-wrap {
            flex: 1;
            height: 6px;
            background: var(--surface2);
            border-radius: 3px;
            overflow: hidden;
        }

        .refresh-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), #60a5fa);
            border-radius: 3px;
            width: 100%;
            transition: width 1s linear;
        }

        .countdown-text { font-size: 0.82rem; color: var(--text-muted); white-space: nowrap; }

        .refresh-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 0.45rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.82rem;
            font-weight: 500;
            transition: opacity 0.2s;
            white-space: nowrap;
        }

        .refresh-btn:hover { opacity: 0.8; }
        .refresh-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .section-label {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-muted);
            margin-bottom: 1rem;
        }

        .etf-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(285px, 1fr));
            gap: 1.25rem;
        }

        .etf-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.5rem;
            transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
            position: relative;
        }

        .etf-card:hover {
            transform: translateY(-2px);
            border-color: #3b82f660;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
        }

        .etf-card.loading { animation: shimmer 1.5s infinite; }

        @keyframes shimmer {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.55; }
        }

        .etf-card.error { border-color: var(--red); }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .etf-symbol {
            font-size: 0.72rem;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: 0.08em;
            background: rgba(59,130,246,0.1);
            padding: 0.2rem 0.6rem;
            border-radius: 6px;
        }

        .etf-badge {
            font-size: 0.7rem;
            color: var(--text-muted);
            background: var(--surface2);
            padding: 0.2rem 0.55rem;
            border-radius: 6px;
        }

        .etf-name {
            font-size: 0.95rem;
            font-weight: 600;
            margin-bottom: 0.35rem;
            line-height: 1.3;
        }

        .etf-description {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 1.2rem;
            line-height: 1.5;
        }

        .price-row {
            display: flex;
            align-items: baseline;
            gap: 0.5rem;
            margin-bottom: 0.6rem;
            flex-wrap: wrap;
        }

        .etf-price {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            font-variant-numeric: tabular-nums;
        }

        .etf-currency { font-size: 0.82rem; color: var(--text-muted); }

        .change-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.2rem;
            padding: 0.22rem 0.65rem;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 600;
            font-variant-numeric: tabular-nums;
        }

        .change-badge.positive { background: rgba(16,185,129,0.12); color: var(--green); }
        .change-badge.negative { background: rgba(239,68,68,0.12); color: var(--red); }
        .change-badge.neutral  { background: rgba(136,146,164,0.12); color: var(--text-muted); }

        .card-divider {
            border: none;
            border-top: 1px solid var(--border);
            margin: 1rem 0 0.75rem;
        }

        .card-stats {
            display: flex;
            justify-content: space-between;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            gap: 0.18rem;
        }

        .stat-label {
            font-size: 0.62rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--text-muted);
            opacity: 0.75;
        }

        .stat-value { font-size: 0.78rem; font-variant-numeric: tabular-nums; }

        .placeholder-val { color: var(--text-muted); opacity: 0.4; }
        .error-msg { color: var(--red); font-size: 0.82rem; margin-top: 0.5rem; }

        footer {
            text-align: center;
            padding: 2rem;
            color: var(--text-muted);
            font-size: 0.78rem;
            border-top: 1px solid var(--border);
            margin-top: 3rem;
            line-height: 1.8;
        }

        footer a { color: var(--accent); text-decoration: none; }
        footer a:hover { text-decoration: underline; }

        /* ── Person portfolio cards ────────────────────────────── */
        .portfolios {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .person-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
        }

        .person-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border);
            background: var(--surface2);
        }

        .person-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.05rem;
            flex-shrink: 0;
        }

        .person-name {
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: -0.01em;
            flex: 1;
        }

        .collapse-btn {
            background: none;
            border: 1px solid var(--border);
            color: var(--text-muted);
            border-radius: 6px;
            padding: 0.2rem 0.6rem;
            font-size: 0.75rem;
            cursor: pointer;
            transition: background 0.15s, color 0.15s;
            white-space: nowrap;
        }
        .collapse-btn:hover { background: var(--surface); color: var(--text); }

        .person-body {
            padding: 1.25rem;
            overflow: hidden;
            transition: max-height 0.3s ease, padding 0.3s ease, opacity 0.3s ease;
        }
        .person-body.collapsed {
            max-height: 0 !important;
            padding-top: 0;
            padding-bottom: 0;
            opacity: 0;
        }

        .etf-info-link {
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
            font-size: 0.7rem;
            color: var(--accent);
            text-decoration: none;
            margin-top: 0.4rem;
            opacity: 0.8;
            transition: opacity 0.15s;
        }
        .etf-info-link:hover { opacity: 1; text-decoration: underline; }

        .person-body .etf-grid {
            grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
        }

        @media (max-width: 640px) {
            header { padding: 1rem; }
            main { padding: 1rem; }
            h1 { font-size: 1.2rem; }
        }

        /* ── Tabs ──────────────────────────────────────────────── */
        .tab-nav {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            display: flex;
            padding: 0 2rem;
            overflow-x: auto;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .tab-btn {
            background: none;
            border: none;
            border-bottom: 3px solid transparent;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            padding: 0.85rem 1.25rem;
            transition: color 0.2s, border-color 0.2s;
            white-space: nowrap;
            letter-spacing: -0.01em;
        }
        .tab-btn:hover { color: var(--text); }
        .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

        .tab-panel { display: none; }
        .tab-panel.active { display: block; }

        /* ── Calculator panel ───────────────────────────────────── */
        .calc-main { max-width: 1200px; margin: 0 auto; padding: 2rem; }

        .calc-controls {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            display: flex;
            align-items: flex-end;
            gap: 1rem;
            flex-wrap: wrap;
            margin-bottom: 1rem;
        }

        .calc-control-group {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
            flex: 1;
            min-width: 200px;
        }

        .calc-label {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-muted);
        }

        .calc-select,
        .calc-date-input {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 0.9rem;
            padding: 0.55rem 0.9rem;
            outline: none;
            transition: border-color 0.2s;
            width: 100%;
            color-scheme: dark;
        }
        .calc-select:focus,
        .calc-date-input:focus { border-color: var(--accent); }
        .calc-select option { background: var(--surface2); }

        .calc-run-btn {
            background: var(--accent);
            border: none;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            padding: 0.6rem 1.5rem;
            transition: opacity 0.2s;
            flex-shrink: 0;
            align-self: flex-end;
            white-space: nowrap;
        }
        .calc-run-btn:hover { opacity: 0.85; }
        .calc-run-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .calc-presets {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-top: 0.4rem;
        }

        .preset-btn {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.78rem;
            font-weight: 600;
            padding: 0.3rem 0.75rem;
            transition: background 0.15s, color 0.15s, border-color 0.15s;
        }
        .preset-btn:hover { background: var(--accent); border-color: var(--accent); color: #fff; }
        .preset-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

        .calc-etf-add-row {
            display: flex;
            gap: 0.5rem;
        }
        .calc-etf-add-row .calc-select { flex: 1; }

        .calc-add-btn {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 700;
            padding: 0.55rem 0.9rem;
            transition: background 0.15s, border-color 0.15s, color 0.15s;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .calc-add-btn:hover { background: var(--accent); border-color: var(--accent); color: #fff; }

        .calc-portfolio-btns {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
            margin-top: 0.5rem;
        }

        .portfolio-add-btn {
            background: color-mix(in srgb, var(--pa-color) 12%, transparent);
            border: 1px solid color-mix(in srgb, var(--pa-color) 35%, transparent);
            border-radius: 6px;
            color: var(--pa-color);
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 700;
            padding: 0.25rem 0.65rem;
            transition: background 0.15s, border-color 0.15s;
        }
        .portfolio-add-btn:hover {
            background: color-mix(in srgb, var(--pa-color) 25%, transparent);
            border-color: var(--pa-color);
        }

        .calc-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
            margin-top: 0.5rem;
            min-height: 1.8rem;
        }

        .etf-chip {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            padding: 0.25rem 0.6rem;
            border-radius: 20px;
            font-size: 0.78rem;
            font-weight: 700;
            border: 1.5px solid;
            letter-spacing: 0.02em;
        }

        .etf-chip-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .etf-chip-remove {
            background: none;
            border: none;
            color: inherit;
            cursor: pointer;
            font-size: 0.9rem;
            line-height: 1;
            opacity: 0.6;
            padding: 0;
            transition: opacity 0.15s;
        }
        .etf-chip-remove:hover { opacity: 1; }

        /* Stats table for multi-ETF */
        .calc-stats-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.82rem;
        }
        .calc-stats-table th {
            color: var(--text-muted);
            font-size: 0.65rem;
            font-weight: 600;
            letter-spacing: 0.07em;
            text-transform: uppercase;
            padding: 0.4rem 0.75rem;
            text-align: right;
            border-bottom: 1px solid var(--border);
        }
        .calc-stats-table th:first-child { text-align: left; }
        .calc-stats-table td {
            padding: 0.45rem 0.75rem;
            text-align: right;
            font-variant-numeric: tabular-nums;
            border-bottom: 1px solid var(--border);
        }
        .calc-stats-table td:first-child { text-align: left; font-weight: 700; }
        .calc-stats-table tr:last-child td { border-bottom: none; }
        .calc-stats-table .positive { color: var(--green); }
        .calc-stats-table .negative { color: var(--red); }

        .calc-status {
            font-size: 0.82rem;
            color: var(--text-muted);
            min-height: 1.2em;
            margin-bottom: 0.75rem;
        }

        .calc-stats {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 1.25rem;
        }
        .calc-stat-label {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.07em;
            color: var(--text-muted);
            margin-bottom: 0.2rem;
        }
        .calc-stat-value {
            font-size: 1.05rem;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
        }
        .calc-stat-value.positive { color: var(--green); }
        .calc-stat-value.negative { color: var(--red); }

        .calc-chart-wrap {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.5rem;
            height: 460px;
            position: relative;
        }

        @media (max-width: 640px) {
            .calc-main { padding: 1rem; }
            .tab-nav { padding: 0 1rem; }
            .calc-chart-wrap { height: 320px; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo">
        <div class="logo-icon">📈</div>
        <div>
            <h1>Portfele <span>ETF</span></h1>
            <div class="last-updated" id="lastUpdated">Pobieranie danych…</div>
        </div>
    </div>
    <div class="header-right">
        <div class="status-indicator">
            <div class="status-dot"></div>
            <span id="countdownText">Następna aktualizacja za: --:--</span>
        </div>
    </div>
</header>

<nav class="tab-nav">
    <button class="tab-btn active" data-tab="portfolios" onclick="switchTab('portfolios')">📊 Portfele</button>
    <button class="tab-btn" data-tab="calculator" onclick="switchTab('calculator')">📈 Wykres ETF</button>
</nav>

<div id="panel-portfolios" class="tab-panel active">

<main>
    <div class="refresh-bar-container">
        <span class="refresh-bar-label">Następne odświeżenie</span>
        <div class="refresh-bar-wrap">
            <div class="refresh-bar" id="refreshBar"></div>
        </div>
        <span class="countdown-text" id="countdownBar">60:00</span>
        <button class="refresh-btn" id="refreshBtn" onclick="onManualRefresh()">↻ Odśwież teraz</button>

        <div style="display:flex;align-items:center;gap:0.5rem;margin-left:1rem;">
            <input class="calc-date-input" id="customCompareDate" type="text" placeholder="Wybierz datę" title="Wybierz datę porównania" style="width:140px;">
            <button class="refresh-btn" id="compareBtn" onclick="applyCustomCompare()">Porównaj</button>
            <button class="refresh-btn" id="clearCompareBtn" onclick="clearCustomCompare()">Wyczyść</button>
        </div>
    </div>

    <div class="portfolios" id="portfolios"></div>

</main>

<footer>
    Dane dostarczone przez <a href="https://stooq.com" target="_blank" rel="noopener noreferrer">Stooq</a>
    &nbsp;·&nbsp; Aktualizacja co godzinę &nbsp;·&nbsp; Ceny mogą być opóŻnione w godzinach handlu
</footer>

</div><!-- /panel-portfolios -->

<div id="panel-calculator" class="tab-panel">
    <main class="calc-main">
        <div class="calc-controls">
            <div class="calc-control-group" style="flex:2;min-width:260px;">
                <label class="calc-label" for="calc-etf-select">ETF</label>
                <div class="calc-etf-add-row">
                    <select class="calc-select" id="calc-etf-select"></select>
                    <button class="calc-add-btn" onclick="addEtf()" title="Dodaj do wykresu">+ Dodaj</button>
                </div>
                <div id="calc-portfolio-btns" class="calc-portfolio-btns"></div>
                <div id="calc-chips"></div>
            </div>
            <div class="calc-control-group">
                <label class="calc-label" for="calc-start-date">Data początkowa</label>
                <input class="calc-date-input" type="text" id="calc-start-date" placeholder="Wybierz datę">
                <div class="calc-presets">
                    <button class="preset-btn" onclick="setPreset(1,'month')">1M</button>
                    <button class="preset-btn" onclick="setPreset(3,'month')">3M</button>
                    <button class="preset-btn" onclick="setPreset(6,'month')">6M</button>
                    <button class="preset-btn active" onclick="setPreset(1,'year')">1R</button>
                    <button class="preset-btn" onclick="setPreset(5,'year')">5L</button>
                </div>
            </div>
            <div style="display:flex;flex-direction:column;gap:0.5rem;flex-shrink:0;align-self:flex-end">
                <button class="calc-run-btn" id="calc-run-btn" onclick="loadChartData()">Pokaż wykres</button>
                <button class="calc-run-btn" style="background:var(--surface2);border:1px solid var(--border);color:var(--text-muted);" onclick="clearChart()">✕ Wyczyść wykres</button>
            </div>
        </div>
        <div id="calc-status" class="calc-status"></div>
        <div id="calc-stats-row" class="calc-stats" style="display:none;"></div>
        <div id="calc-chart-wrap" class="calc-chart-wrap" style="display:none;">
            <canvas id="price-chart"></canvas>
        </div>
    </main>
</div>

<script>
    // ═══════════════════════════════════════════════════════════
    //  CONFIGURATION — edit only this section to add/remove ETFs
    //  or portfolios. Cards and fetch logic all update
    //  automatically — no other changes needed.
    //
    //  Data source : Stooq  https://stooq.com  (free, no key)
    //  CORS proxy  : corsproxy.io              (no setup needed)
    // ═══════════════════════════════════════════════════════════

    const REFRESH_INTERVAL_MS = 60 * 60 * 1000; // price auto-refresh interval (ms)

    // ETF entry fields:
    //   id          — unique DOM key; recommended format: INITIALS_SYMBOL_EXCHANGE
    //   symbol      — display ticker shown on the card badge
    //   stooqSymbol — lowercase symbol with exchange suffix used for API calls
    //                 verify at: https://stooq.com/q/?s=<symbol>

    // ── Number formatter ──────────────────────────────────────

    function fmt(value, currency) {
        if (value === null || value === undefined || isNaN(value)) return '—';
        const locale = (currency === 'PLN') ? 'pl-PL' : 'en-US';
        return new Intl.NumberFormat(locale, {
            minimumFractionDigits: 2,
            maximumFractionDigits: 2,
        }).format(parseFloat(value));
    }

    // ── Update a single card with Stooq quote response ──────────
    function updateCard(etf, data) {
        const card = document.getElementById(`card-${etf.id}`);
        if (!card) return;
        card.classList.remove('loading');

        if (!data || !data.close) {
            card.classList.add('error');
            card.innerHTML = `
                <div class="card-header">
                    <span class="etf-symbol">${etf.symbol}</span>
                    <span class="etf-badge">${etf.exchange}</span>
                </div>
                <div class="etf-name">${etf.name}</div>
                <div class="etf-description">${etf.description}</div>
                ${etf.infoUrl ? `<a class="etf-info-link" href="${etf.infoUrl}" target="_blank" rel="noopener noreferrer">🔗 Więcej informacji</a>` : ''}
                <p class="error-msg">⚠ Dane niedostępne</p>
            `;
            return;
        }

        card.classList.remove('error');
        const price     = parseFloat(data.close);
        const open      = parseFloat(data.open);
        const currency  = etf.currency;
        const change    = price - open;
        const changePct = open ? ((price - open) / open) * 100 : NaN;
        const isPos     = change > 0;
        const isNeg     = change < 0;
        const badgeClass = isPos ? 'positive' : isNeg ? 'negative' : 'neutral';
        const arrow     = isPos ? '▲' : isNeg ? '▼' : '→';
        const sign      = isPos ? '+' : '';

        // Baseline comparison (01.03.2026)
        const baseline = baselinePrices[etf.yahooSymbol];
        let baselineHtml = `<div style="margin-bottom:0.25rem;"><span class="change-badge neutral">— vs ${BASELINE_DISPLAY}</span></div>`;
        if (baseline !== undefined && baseline !== null && !isNaN(baseline) && baseline > 0) {
            const basePct = ((price - baseline) / baseline) * 100;
            const isBasePos = basePct > 0;
            const isBaseNeg = basePct < 0;
            const baseClass = isBasePos ? 'positive' : isBaseNeg ? 'negative' : 'neutral';
            const baseArrow = isBasePos ? '▲' : isBaseNeg ? '▼' : '→';
            const baseSign = isBasePos ? '+' : '';
            baselineHtml = `<div style="margin-bottom:0.25rem;"><span class="change-badge ${baseClass}">${baseArrow} ${baseSign}${basePct.toFixed(2)}% vs ${BASELINE_DISPLAY}</span></div>`;
        }

        // Custom user-selected date comparison (if set)
        let customBaselineHtml = '';
        if (customCompareDateStr) {
            const customBase = customBaselinePrices[etf.yahooSymbol];
            if (customBase !== undefined && customBase !== null && !isNaN(customBase) && customBase > 0) {
                const cPct = ((price - customBase) / customBase) * 100;
                const isCPos = cPct > 0;
                const isCNeg = cPct < 0;
                const cClass = isCPos ? 'positive' : isCNeg ? 'negative' : 'neutral';
                const cArrow = isCPos ? '▲' : isCNeg ? '▼' : '→';
                const cSign = isCPos ? '+' : '';
                customBaselineHtml = `<div style="margin-bottom:0.25rem;"><span class="change-badge ${cClass}">${cArrow} ${cSign}${cPct.toFixed(2)}% vs ${customCompareDateStr}</span></div>`;
            } else {
                // user picked date but we don't have data for this ETF
                customBaselineHtml = `<div style="margin-bottom:0.25rem;"><span class="change-badge neutral">— vs ${customCompareDateStr}</span></div>`;
            }
        }

        card.innerHTML = `
            <div class="card-header">
                <span class="etf-symbol">${etf.symbol}</span>
                <span class="etf-badge">${currency}</span>
            </div>
            <div class="etf-name">${etf.name}</div>
            <div class="etf-description">${etf.description}</div>
            ${etf.infoUrl ? `<a class="etf-info-link" href="${etf.infoUrl}" target="_blank" rel="noopener noreferrer">🔗 Więcej informacji</a>` : ''}
            <div class="price-row">
                <span class="etf-price">${fmt(price, currency)}</span>
                <span class="etf-currency">${currency}</span>
            </div>
            <div style="margin-bottom:0.25rem;">
                <span class="change-badge ${badgeClass}">
                    ${arrow} ${sign}${fmt(Math.abs(change), currency)}
                    &nbsp;(${sign}${isNaN(changePct) ? '—' : changePct.toFixed(2)}%) vs otwarcie
                </span>
            </div>
            ${baselineHtml}
            ${customBaselineHtml}
            <hr class="card-divider">
            <div class="card-stats">
                <div class="stat-item">
                    <span class="stat-label">Otwarcie</span>
                    <span class="stat-value">${fmt(data.open, currency)}</span>

    // ── Main fetch — Stooq via corsproxy.io (parallel per-symbol) ─
    async function fetchAllPrices() {
        clearTimeout(refreshTimer);
        nextRefreshTime = Date.now() + REFRESH_INTERVAL_MS;

        document.querySelectorAll('.etf-card').forEach(c => c.classList.add('loading'));
        document.getElementById('refreshBtn').disabled = true;

        const PROXY = 'https://corsproxy.io/?';

        const results = await Promise.allSettled(
            ALL_ETFS.map(async etf => {
                const stooqUrl = `https://stooq.com/q/l/?s=${etf.stooqSymbol}&f=sd2t2ohlcv&h&e=json`;
                const res = await fetch(`${PROXY}${stooqUrl}`);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const json = await res.json();
                return json.symbols?.[0] ?? null;
            })
        );

        let anySuccess = false;
        ALL_ETFS.forEach((etf, i) => {
            const value = (results[i].status === 'fulfilled' && results[i].value) ? results[i].value : null;
            // cache the last raw quote result so we can re-render without refetch when user sets custom date
            lastQuoteData[etf.yahooSymbol] = value;

            if (value) {
                updateCard(etf, value);
                anySuccess = true;
            } else {
                console.warn(`[ETF Tracker] Failed to fetch ${etf.symbol}:`, results[i].reason);
                updateCard(etf, null);
            }
        });

        const now = new Date();
        document.getElementById('lastUpdated').textContent = anySuccess
            ? `Ostatnia aktualizacja: ${now.toLocaleTimeString('pl-PL', { hour: '2-digit', minute: '2-digit', second: '2-digit' })} (${now.toLocaleDateString('pl-PL')})`
            : 'Aktualizacja nie powiodła się — ponowię za 1 godzinę';

        document.getElementById('refreshBtn').disabled = false;
        refreshTimer = setTimeout(fetchAllPrices, REFRESH_INTERVAL_MS);
    }

    // ── Baseline fetch (01.03.2026) ───────────────────────────
    async function fetchBaselinePriceForEtf(etf) {
        if (!etf.yahooSymbol) return null;
        const PROXY = 'https://corsproxy.io/?';
        const yahoo = etf.yahooSymbol;
        const baselineDate = new Date(BASELINE_DATE_STR + 'T00:00:00Z');
        const period2 = Math.floor((baselineDate.getTime() + 24 * 60 * 60 * 1000) / 1000);
        const period1 = Math.floor((baselineDate.getTime() - BASELINE_LOOKBACK_DAYS * 24 * 60 * 60 * 1000) / 1000);
        const url = `https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(yahoo)}?interval=1d&period1=${period1}&period2=${period2}`;
        const res = await fetch(PROXY + url);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const json = await res.json();
        const result = json?.chart?.result?.[0];
        if (!result) throw new Error(`${etf.symbol}: brak danych z Yahoo`);
        const timestamps = result.timestamp ?? [];
        const closes = result.indicators?.quote?.[0]?.close ?? [];
        if (timestamps.length === 0) throw new Error(`${etf.symbol}: brak notowań`);
        for (let i = timestamps.length - 1; i >= 0; i--) {
            const dStr = new Date(timestamps[i] * 1000).toISOString().slice(0, 10);
            if (dStr <= BASELINE_DATE_STR) {
                const c = closes[i];
                if (c != null && !isNaN(c)) return c;
            }
        }
        throw new Error(`${etf.symbol}: brak notowań przed ${BASELINE_DATE_STR}`);
    }

    async function fetchBaselinePrices() {
        console.log('[ETF Tracker] Fetching baseline prices for', BASELINE_DATE_STR);
        const tasks = ALL_ETFS.map(async etf => {
            try {
                const price = await fetchBaselinePriceForEtf(etf);
                baselinePrices[etf.yahooSymbol] = price;
            } catch (e) {
                console.warn(`[ETF Tracker] baseline fetch failed for ${etf.symbol}: ${e.message}`);
                baselinePrices[etf.yahooSymbol] = null;
            }
        });
        await Promise.all(tasks);
        console.log('[ETF Tracker] Baseline prices loaded.');
    }

    async function fetchCustomBaselinePriceForEtf(etf, dateStr) {
        if (!etf.yahooSymbol) return null;
        const PROXY = 'https://corsproxy.io/?';
        const yahoo = etf.yahooSymbol;
        const baselineDate = new Date(dateStr + 'T00:00:00Z');
        const period2 = Math.floor((baselineDate.getTime() + 24 * 60 * 60 * 1000) / 1000);
        const period1 = Math.floor((baselineDate.getTime() - BASELINE_LOOKBACK_DAYS * 24 * 60 * 60 * 1000) / 1000);
        const url = `https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(yahoo)}?interval=1d&period1=${period1}&period2=${period2}`;
        const res = await fetch(PROXY + url);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const json = await res.json();
        const result = json?.chart?.result?.[0];
        if (!result) throw new Error(`${etf.symbol}: brak danych z Yahoo`);
        const timestamps = result.timestamp ?? [];
        const closes = result.indicators?.quote?.[0]?.close ?? [];
        if (timestamps.length === 0) throw new Error(`${etf.symbol}: brak notowań`);
        for (let i = timestamps.length - 1; i >= 0; i--) {
            const dStr = new Date(timestamps[i] * 1000).toISOString().slice(0, 10);
            if (dStr <= dateStr) {
                const c = closes[i];
                if (c != null && !isNaN(c)) return c;

        clearTimeout(refreshTimer);
        clearInterval(countdownInterval);
        fetchAllPrices();
        startCountdown();
    }

    // ── Custom compare UI handlers ────────────────────────────
    async function applyCustomCompare() {
        const input = document.getElementById('customCompareDate');
        const btn = document.getElementById('compareBtn');
        const dateStr = input.value;
        if (!dateStr) return;
        btn.disabled = true;
        customCompareDateStr = dateStr;
        // clear previous values
        for (const k in customBaselinePrices) delete customBaselinePrices[k];
        try {
            await fetchCustomBaselines(dateStr);
            // re-render using cached lastQuoteData if available
            const hasAnyLast = Object.keys(lastQuoteData).length > 0;
            if (hasAnyLast) {
                ALL_ETFS.forEach(etf => updateCard(etf, lastQuoteData[etf.yahooSymbol] ?? null));
            } else {
                // fallback to fetching live prices
                await fetchAllPrices();
            }
        } catch (e) {
            console.warn('[ETF Tracker] applyCustomCompare error', e);
        } finally {
            btn.disabled = false;
        }
    }

    function clearCustomCompare() {
        customCompareDateStr = null;
        for (const k in customBaselinePrices) delete customBaselinePrices[k];
        const input = document.getElementById('customCompareDate');
        if (input) input.value = '';
        // re-render using cached lastQuoteData
        ALL_ETFS.forEach(etf => updateCard(etf, lastQuoteData[etf.yahooSymbol] ?? null));
    }

    // ── Countdown timer & progress bar ────────────────────────
    function startCountdown() {
        clearInterval(countdownInterval);
        countdownInterval = setInterval(() => {
            if (!nextRefreshTime) return;
            const remaining = Math.max(0, nextRefreshTime - Date.now());
            const totalSec  = REFRESH_INTERVAL_MS / 1000;
            const remSec    = Math.ceil(remaining / 1000);
            const minutes   = Math.floor(remSec / 60);
            const seconds   = remSec % 60;
            const pct       = (remaining / REFRESH_INTERVAL_MS) * 100;
            const label     = `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;

            document.getElementById('countdownText').textContent = `Następna aktualizacja za: ${label}`;
            document.getElementById('countdownBar').textContent  = label;
            document.getElementById('refreshBar').style.width    = `${pct}%`;
        }, 1000);
    }

    // ── Initialise ────────────────────────────────────────────
    buildGrid();           // render skeleton cards from PORTFOLIOS
    // Fetch baseline prices for 01.03.2026 first, then load live prices
    fetchBaselinePrices().catch(e => console.warn('[ETF Tracker] baseline error', e)).finally(() => {
        fetchAllPrices();      // kick off first live-price fetch
        startCountdown();
    });

    // ── Tab switching ──────────────────────────────────────────
    function switchTab(name) {
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('panel-' + name).classList.add('active');
        document.querySelector(`.tab-btn[data-tab="${name}"]`).classList.add('active');
    }

    // ── Calculator — populate ETF dropdown ────────────────────
    function buildCalcSelect() {
        const sel = document.getElementById('calc-etf-select');
        sel.innerHTML = PORTFOLIOS.map(portfolio =>
            `<optgroup label="${portfolio.name}">${
                portfolio.etfs.map(etf =>
                    `<option value="${etf.yahooSymbol}" data-currency="${etf.currency}" data-symbol="${etf.symbol}">${etf.symbol} — ${etf.name} (${etf.currency})</option>`
                ).join('')
            }</optgroup>`
        ).join('');

        const container = document.getElementById('calc-portfolio-btns');
        container.innerHTML = PORTFOLIOS.map(p =>
            `<button class="portfolio-add-btn" style="--pa-color:${p.color}" onclick="addAllPortfolio('${p.name}')">${p.name}</button>`
        ).join('');
    }

    function addAllPortfolio(name) {
        const portfolio = PORTFOLIOS.find(p => p.name === name);
        if (!portfolio) return;
        for (const etf of portfolio.etfs) {
            if (selectedEtfs.find(e => e.yahooSymbol === etf.yahooSymbol)) continue;
            if (selectedEtfs.length >= CHART_COLORS.length) break;
            selectedEtfs.push({ yahooSymbol: etf.yahooSymbol, ticker: etf.symbol, currency: etf.currency, color: CHART_COLORS[selectedEtfs.length] });
        }
        renderChips();
    }

    // ── Multi-ETF selection state ──────────────────────────────
    const CHART_COLORS = ['#3b82f6','#10b981','#f59e0b','#8b5cf6','#ec4899','#06b6d4','#f97316','#ef4444'];
    let selectedEtfs = []; // [{yahooSymbol, ticker, currency, color}]

    function addEtf() {
        const sel      = document.getElementById('calc-etf-select');
        const yahoo    = sel.value;
        const ticker   = sel.selectedOptions[0]?.dataset.symbol   ?? yahoo;
        const currency = sel.selectedOptions[0]?.dataset.currency ?? '';

        if (selectedEtfs.find(e => e.yahooSymbol === yahoo)) return; // already added
        if (selectedEtfs.length >= CHART_COLORS.length) return;      // max 8

        const color = CHART_COLORS[selectedEtfs.length];
        selectedEtfs.push({ yahooSymbol: yahoo, ticker, currency, color });
        renderChips();
    }

    function removeEtf(yahoo) {
        selectedEtfs = selectedEtfs.filter(e => e.yahooSymbol !== yahoo);
        // re-assign colors to keep them packed from index 0
        selectedEtfs.forEach((e, i) => { e.color = CHART_COLORS[i]; });
        renderChips();
    }

    function renderChips() {
        const container = document.getElementById('calc-chips');
        if (selectedEtfs.length === 0) {
            container.innerHTML = '<span style="font-size:0.75rem;color:var(--text-muted);opacity:0.6">Dodaj przynajmniej jeden ETF</span>';
            return;
        }
        container.innerHTML = selectedEtfs.map(e => `
            <span class="etf-chip" style="color:${e.color};border-color:${e.color}20;background:${e.color}18;">
                <span class="etf-chip-dot" style="background:${e.color}"></span>
                ${e.ticker}
                <button class="etf-chip-remove" onclick="removeEtf('${e.yahooSymbol}')" title="Usuń">✕</button>
            </span>
        `).join('');
    }

    function clearChart() {
        selectedEtfs = [];
        renderChips();
        const statsRow  = document.getElementById('calc-stats-row');
        const chartWrap = document.getElementById('calc-chart-wrap');
        const statusEl  = document.getElementById('calc-status');
        statsRow.style.display  = 'none';
        chartWrap.style.display = 'none';
        statusEl.textContent = '';
        if (priceChart) { priceChart.destroy(); priceChart = null; }
    }

    // ── Calculator — fetch & render chart (multi-ETF) ─────────
    let priceChart = null;

    async function loadChartData() {
        const startDate = document.getElementById('calc-start-date').value;
        const statusEl  = document.getElementById('calc-status');
        const statsRow  = document.getElementById('calc-stats-row');
        const chartWrap = document.getElementById('calc-chart-wrap');

        if (selectedEtfs.length === 0) {
            statusEl.textContent = 'Dodaj przynajmniej jeden ETF przyciskiem "+ Dodaj".';
            return;
        }
        if (!startDate) {
            statusEl.textContent = 'Wybierz datę początkową.';
            return;
        }

        statusEl.textContent = 'Pobieranie danych…';
        statsRow.style.display  = 'none';
        chartWrap.style.display = 'none';
        document.getElementById('calc-run-btn').disabled = true;

        const PROXY   = 'https://corsproxy.io/?';
        const period1 = Math.floor(new Date(startDate).getTime() / 1000);
        const period2 = Math.floor(Date.now() / 1000);

        try {
            const results = await Promise.all(selectedEtfs.map(async etf => {
                const url = `https://query1.finance.yahoo.com/v8/finance/chart/${etf.yahooSymbol}?interval=1d&period1=${period1}&period2=${period2}`;
                const res = await fetch(PROXY + url);
                if (!res.ok) throw new Error(`${etf.ticker}: HTTP ${res.status}`);
                const json   = await res.json();
                const result = json?.chart?.result?.[0];
                if (!result) throw new Error(`${etf.ticker}: ${json?.chart?.error?.description ?? 'brak danych'}`);

                const timestamps = result.timestamp ?? [];
                const closes     = result.indicators?.quote?.[0]?.close ?? [];
                const dates  = [];
                const prices = [];
                for (let i = 0; i < timestamps.length; i++) {
                    const c = closes[i];
                    if (c == null || isNaN(c)) continue;
                    dates.push(new Date(timestamps[i] * 1000).toISOString().slice(0, 10));
                    prices.push(c);
                }
                if (dates.length === 0) throw new Error(`${etf.ticker}: brak notowań w wybranym zakresie`);
                return { ...etf, dates, prices };
            }));

            renderStats(results);
            renderPriceChart(results);
            statsRow.style.display  = 'block';
            chartWrap.style.display = 'block';
            statusEl.textContent    = '';
        } catch (e) {
            statusEl.textContent = `Błąd: ${e.message}`;
        } finally {
            document.getElementById('calc-run-btn').disabled = false;
        }
    }

    // ── Stats table ───────────────────────────────────────────
    function renderStats(results) {
        const statsRow = document.getElementById('calc-stats-row');
        statsRow.innerHTML = `
            <table class="calc-stats-table">
                <thead>
                    <tr>
                        <th>ETF</th>
                        <th>Start</th>
                        <th>Aktualnie</th>
                        <th>Zmiana</th>
                        <th>Maks.</th>
                        <th>Min.</th>
                        <th>Notowań</th>
                    </tr>
                </thead>
                <tbody>
                    ${results.map(r => {
                        const first  = r.prices[0];
                        const last   = r.prices[r.prices.length - 1];
                        const chPct  = ((last - first) / first) * 100;
                        const isPos  = last >= first;
                        const sign   = isPos ? '+' : '';
                        const maxP   = Math.max(...r.prices);
                        const minP   = Math.min(...r.prices);
                        return `<tr>
                            <td><span style="display:inline-flex;align-items:center;gap:0.4rem">
                                <span style="width:10px;height:10px;border-radius:50%;background:${r.color};flex-shrink:0;display:inline-block"></span>
                                ${r.ticker}
                            </span></td>
                            <td>${first.toFixed(2)} ${r.currency}</td>
                            <td>${last.toFixed(2)} ${r.currency}</td>
                            <td class="${isPos ? 'positive' : 'negative'}">${sign}${chPct.toFixed(2)}%</td>
                            <td>${maxP.toFixed(2)}</td>
                            <td>${minP.toFixed(2)}</td>
                            <td>${r.prices.length}</td>
                        </tr>`;
                    }).join('')}
                </tbody>
            </table>`;
    }

    // ── Chart renderer (multi-dataset) ───────────────────────
    function renderPriceChart(results) {
        if (priceChart) { priceChart.destroy(); priceChart = null; }

        const multi    = results.length > 1;
        // For multi-ETF: normalize to % return from first point (Y = % change)
        // For single ETF: use raw prices

        const datasets = results.map(r => {
            let data;
            if (multi) {
                data = r.prices.map(p => +((p / r.prices[0] - 1) * 100).toFixed(4));
            } else {
                data = r.prices;
            }
            return {
                label: `${r.ticker} (${r.currency})`,
                data,
                dates: r.dates,
                borderColor: r.color,
                backgroundColor: r.color + '18',
                fill: !multi,
                pointRadius: r.dates.length > 150 ? 0 : 3,
                pointHoverRadius: 5,
                borderWidth: 2,
                tension: 0.1,
            };
        });

        // Use the longest date array as labels; others may be shorter
        const allDates = results.reduce((a, b) => a.dates.length >= b.dates.length ? a : b).dates;

        // Align all datasets to the common date axis
        const alignedDatasets = datasets.map((ds, i) => {
            const r = results[i];
            const dateMap = new Map(r.dates.map((d, j) => [d, ds.data[j]]));
            return { ...ds, data: allDates.map(d => dateMap.has(d) ? dateMap.get(d) : null) };
        });

        const canvas = document.getElementById('price-chart');
        priceChart = new Chart(canvas, {
            type: 'line',
            data: { labels: allDates, datasets: alignedDatasets },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                spanGaps: true,
                plugins: {
                    legend: { labels: { color: '#e2e8f0', font: { size: 13 } } },
                    tooltip: {
                        mode: 'index',
                        intersect: false,
                        callbacks: {
                            label: ctx => {
                                const v = ctx.parsed.y;
                                if (v == null) return null;
                                if (multi) return `${ctx.dataset.label}: ${v >= 0 ? '+' : ''}${v.toFixed(2)}%`;
                                return `${ctx.dataset.label}: ${v.toFixed(2)} ${results[0].currency}`;
                            }
                        }
                    }
                },
                scales: {
                    x: {
                        ticks: { color: '#8892a4', maxTicksLimit: 12, maxRotation: 0 },
                        grid: { color: '#2d3244' }
                    },
                    y: {
                        ticks: {
                            color: '#8892a4',
                            callback: val => multi ? `${val >= 0 ? '+' : ''}${val.toFixed(1)}%` : val.toFixed(2)
                        },
                        grid: { color: '#2d3244' }
                    }
                },
                interaction: { mode: 'nearest', axis: 'x', intersect: false }
            }
        });
    }

    // Initialise calculator dropdown
    buildCalcSelect();
    renderChips();

    // ── Preset date buttons ───────────────────────────────────
    function setPreset(amount, unit) {
        const d = new Date();
        if (unit === 'month') d.setMonth(d.getMonth() - amount);
        else                  d.setFullYear(d.getFullYear() - amount);
        document.getElementById('calc-start-date').value = d.toISOString().slice(0, 10);
        document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
        event.currentTarget.classList.add('active');
    }

    // Clear active preset when user manually edits the date
    document.getElementById('calc-start-date').addEventListener('input', () => {
        document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
    });

    // Default start date: 1 year ago (matches the active "1R" preset)
    (function setDefaultDate() {
        const d = new Date();
        d.setFullYear(d.getFullYear() - 1);
        document.getElementById('calc-start-date').value = d.toISOString().slice(0, 10);
    })();

    // Initialize Flatpickr pickers (Polish locale) for better UX
    (function initDatePickers() {
        if (typeof flatpickr !== 'function') {
            console.warn('[ETF Tracker] flatpickr not available — using native inputs');
            return;
        }
        try {
            if (flatpickr.l10ns && flatpickr.l10ns.pl) flatpickr.localize(flatpickr.l10ns.pl);
        } catch (e) {}

        // Custom compare date (shows dd.mm.yyyy but keeps value as YYYY-MM-DD)
        flatpickr('#customCompareDate', {
            locale: 'pl',
            dateFormat: 'Y-m-d',
            altInput: true,
            altFormat: 'd.m.Y',
            allowInput: true,
            maxDate: 'today',
            disableMobile: true,
        });

        // Calculator start date
        flatpickr('#calc-start-date', {
            locale: 'pl',
            dateFormat: 'Y-m-d',
            altInput: true,
            altFormat: 'd.m.Y',
            allowInput: true,
            maxDate: 'today',
            disableMobile: true,
        });
    })();

</script>
